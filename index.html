<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大家的日本語 學習 App</title>
<style>
:root{--red:#c0392b;--green:#27ae60;--bg:#f4f3ef;--card:#fff;--text:#2c2c2c;--muted:#888;--border:#e8e8e8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:900px;margin:0 auto;padding:16px;}
/* Header */
.hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--red);border-radius:12px;color:#fff;margin-bottom:18px;}
.hdr h1{font-size:1.1rem;font-weight:700;}
.hdr .back{cursor:pointer;font-size:1.3rem;opacity:.9;}
.hdr .back:hover{opacity:1;}
.hdr-right{margin-left:auto;font-size:.82rem;opacity:.88;}
/* Cards */
.card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 5px rgba(0,0,0,.07);}
/* Progress */
.pb-wrap{background:#eee;border-radius:99px;height:10px;margin:14px 0;overflow:hidden;}
.pb-fill{height:100%;background:var(--red);border-radius:99px;transition:width .3s;}
/* Buttons */
.btn{display:inline-block;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:.92rem;font-weight:600;transition:opacity .15s;}
.btn:hover{opacity:.86;}
.btn-red{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-outline{background:#fff;color:var(--red);border:2px solid var(--red);}
.btn-sm{padding:5px 12px;font-size:.8rem;}
.btn-full{width:100%;display:block;text-align:center;margin-top:8px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
/* Home stats */
.stat-row{display:flex;gap:12px;margin:14px 0;}
.stat{flex:1;background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat .num{font-size:1.8rem;font-weight:700;color:var(--red);}
.stat .lbl{font-size:.78rem;color:var(--muted);margin-top:3px;}
/* Lesson grid */
.vol-lbl{font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:1px;margin:18px 0 8px;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px;}
.lcard{background:#fff;border-radius:9px;padding:11px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.lcard:hover{border-color:var(--red);transform:translateY(-2px);}
.lcard.done{background:#e8f5e9;border-color:var(--green);}
.lcard.active{background:#fff8f8;border-color:var(--red);}
.lcard .lnum{font-size:1.1rem;font-weight:700;color:var(--red);}
.lcard.done .lnum{color:var(--green);}
.lcard .lst{font-size:.65rem;color:var(--muted);margin-top:2px;}
.lcard.done .lst{color:var(--green);}
/* Lesson header */
.l-hdr{background:var(--red);color:#fff;border-radius:12px;padding:18px;margin-bottom:14px;}
.l-hdr .l-num{font-size:.8rem;opacity:.8;margin-bottom:3px;}
.l-hdr h2{font-size:1.2rem;margin-bottom:2px;}
.l-hdr .l-topic{font-size:.85rem;opacity:.82;}
.l-nav{display:flex;justify-content:space-between;margin-top:12px;}
.l-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;}
.l-nav button:hover{background:rgba(255,255,255,.3);}
.l-nav button:disabled{opacity:.35;cursor:default;}
/* Tabs */
.tabs{display:flex;background:#fff;border-radius:10px;padding:4px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tab{flex:1;padding:9px 4px;border:none;background:none;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:500;color:var(--muted);transition:all .15s;}
.tab.on{background:var(--red);color:#fff;font-weight:700;}
/* Vocab */
.v-item{display:grid;grid-template-columns:140px 140px 1fr auto;align-items:center;padding:10px 14px;background:#fff;border-radius:9px;border:1.5px solid var(--border);gap:8px;margin-bottom:7px;}
.v-item.known{border-color:var(--green);background:#f0faf3;}
.v-jp{font-size:1rem;font-weight:600;}
.v-rd{font-size:.8rem;color:var(--muted);}
.v-tw{font-size:.9rem;}
.k-btn{padding:4px 9px;border-radius:5px;border:1.5px solid #ccc;background:#fff;cursor:pointer;font-size:.75rem;white-space:nowrap;}
.v-item.known .k-btn{background:var(--green);color:#fff;border-color:var(--green);}
/* Video */
.vid-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:10px;overflow:hidden;margin-bottom:18px;}
.vid-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
/* Grammar */
.g-point{margin-bottom:16px;padding:14px 16px;border-left:4px solid var(--red);background:#fff;border-radius:0 10px 10px 0;}
.g-pat{font-size:1rem;font-weight:700;color:var(--red);margin-bottom:5px;}
.g-exp{font-size:.87rem;color:#555;line-height:1.65;margin-bottom:8px;}
.g-ex{display:flex;flex-direction:column;gap:5px;}
.ex-box{background:#fafafa;padding:7px 11px;border-radius:6px;}
.ex-jp{font-size:.92rem;}
.ex-tw{font-size:.8rem;color:var(--muted);margin-top:1px;}
/* Quiz */
.qz-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.qz-bar span{font-size:.82rem;color:var(--muted);}
.qz-card{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;}
.qz-type{font-size:.75rem;color:var(--muted);margin-bottom:7px;}
.qz-q{font-size:1.05rem;font-weight:600;margin-bottom:3px;}
.qz-sub{font-size:.82rem;color:var(--muted);}
.qz-opts{display:flex;flex-direction:column;gap:7px;margin-top:14px;}
.qz-opt{padding:11px 14px;border:2px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:.9rem;text-align:left;transition:all .15s;}
.qz-opt:hover:not([disabled]){border-color:var(--red);background:#fff8f8;}
.qz-opt.correct{border-color:var(--green) !important;background:#e8f5e9;color:#1a6b3a;}
.qz-opt.wrong{border-color:#e74c3c !important;background:#fde8e8;color:#8b1a1a;}
.qz-exp{margin-top:8px;padding:8px 12px;background:#fffde7;border-radius:6px;font-size:.82rem;color:#7a6000;}
.qz-result{text-align:center;padding:28px 16px;}
.qz-score{font-size:3.2rem;font-weight:700;color:var(--red);}
.qz-score.pass{color:var(--green);}
@keyframes emojifall{0%{transform:translateY(-80px) rotate(-10deg);opacity:1;}100%{transform:translateY(110vh) rotate(15deg);opacity:.8;}}
.emoji-rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden;}
.emoji-drop{position:absolute;top:0;animation:emojifall linear infinite;}
.qz-msg{font-size:1rem;margin:8px 0 20px;}
/* Misc */
.sec-ttl{font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:10px;}
.tc{text-align:center;}
.row{display:flex;align-items:center;gap:8px;}
.ml{margin-left:auto;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.72rem;font-weight:600;}
.badge-g{background:#e8f5e9;color:var(--green);}
.badge-y{background:#fff8e1;color:#e67e22;}
.badge-r{background:#fde8e8;color:#e74c3c;}
</style>
</head>

{p:"条件文（と・ば・たら・なら）の復習",e:"と：自然結果。ば：假設・後悔（〜ばよかった）。たら：完成後假設。なら：前提・建議。",ex:[{j:"あめが ふったら、うちに います。",t:"如果下雨的話，在家待著。"},{j:"にほんに いくなら、はるが おすすめです。",t:"如果去日本，推薦春天。"}]},
{p:"敬語（尊敬語・謙譲語）の復習",e:"尊敬語：いらっしゃいます（います/いきます/きます）・おっしゃいます・なさいます・めしあがります。謙讓語：おります・まいります・もうします・いたします・いただきます。",ex:[{j:"しゃちょうは いらっしゃいますか。",t:"社長在嗎？（尊敬語）"},{j:"わたしは やまもとと もうします。",t:"我叫山本。（謙讓語）"}]},
],

// ─── 補充文法（GRAMMAR_EXT）────────────────────────────────────
// 每課原有 g[] 只有精簡版，這裡補充更完整的說明，渲染時合併顯示
const GRAMMAR_EXT = {
1:[
{p:"〜の〜（所有・關係）",e:"の 接在兩個名詞之間，表示「A 的 B」（所有・所屬・說明）。A の B：A 是修飾 B 的成分。も 表示「也」，放在は的位置替換。",ex:[{j:"これは わたしの かばんです。",t:"這是我的包包。"},{j:"やまださんは にほんごの せんせいです。",t:"山田先生是日文老師。"},{j:"わたしも がくせいです。",t:"我也是學生。"}]},
{p:"〜も（也）",e:"も 取代は，表示「也一樣」。否定時也用も：「〜もじゃないです」。注意：は和も不能同時出現，要用も時直接替換は。",ex:[{j:"ミラーさんは かいしゃいんです。グプタさんも かいしゃいんです。",t:"米勒先生是公司職員。古普塔先生也是公司職員。"},{j:"これも にほんごの ほんですか。",t:"這個也是日文書嗎？"}]},
{p:"〜ね／〜よ（語尾助詞）",e:"ね：「是吧、對吧」，確認・共鳴，語調下降。よ：「喔！」強調告知對方不知道的事，語調上升。兩者可合用：〜よね（你知道吧）。",ex:[{j:"いい てんきですね。",t:"天氣真好呢。"},{j:"ミラーさんは アメリカじんじゃないですよ。",t:"米勒先生不是美國人喔。"}]},
],
2:[
{p:"これ・それ・あれ・どれ（事物指示）",e:"これ：靠近自己。それ：靠近對方。あれ：雙方都遠。どれ：哪一個？（三個以上選一）。用於指事物，不能直接接名詞（接名詞要用この/その/あの/どの）。",ex:[{j:"それは なんですか。",t:"那是什麼？"},{j:"あれは くるまです。",t:"那個是車子。"},{j:"どれが やまださんの かばんですか。",t:"哪個是山田先生的包包？"}]},
{p:"〜語（語言）・〜じん（國籍）・〜の（領域）",e:"語言說法：にほんご・えいご・ちゅうごくご。國籍：にほんじん・アメリカじん。領域所屬：にほんごの ほん（日文書）、かがくの せんせい（理科老師）。",ex:[{j:"これは えいごの じしょです。",t:"這是英文字典。"},{j:"ミラーさんは えいごの せんせいです。",t:"米勒先生是英文老師。"}]},
{p:"〜のです か（「〜的」代替名詞）",e:"の 可替代前面出現過的名詞，避免重複。「どの かばんが あなたのですか」中，の代替 かばん。也用於強調所屬。",ex:[{j:"この じしょは あなたのですか。",t:"這本字典是你的嗎？"},{j:"わたしのは あかいです。",t:"我的（那個）是紅色的。"}]},
],
3:[
{p:"ここ・そこ・あそこ・どこ（場所指示）",e:"場所指示和事物指示的距離感相同。どこ 是疑問詞。に 接在場所後表示存在的位置：「〜に あります/います」。",ex:[{j:"すみません、トイレは どこですか。",t:"不好意思，廁所在哪裡？"},{j:"トイレは あそこです。",t:"廁所在那裡。"},{j:"やまださんは いま どこに いますか。",t:"山田先生現在在哪裡？"}]},
{p:"この・その・あの・どの＋名詞",e:"指示詞直接接名詞時用この/その/あの/どの。これ/それ/あれ/どれ 後面不能直接接名詞。この本（這本書）是「この＋名詞」的結合，不是「これ」的變化。",ex:[{j:"この たてものは ゆうびんきょくです。",t:"這棟建築物是郵局。"},{j:"その レストランは おいしいですか。",t:"那家餐廳好吃嗎？"},{j:"どの バスに のりますか。",t:"要搭哪班公車？"}]},
{p:"〜円・〜番（數字の使い方）",e:"日文數字後接助數詞。円（えん）：金額。番（ばん）：號碼。電話番号（でんわばんごう）。何階（なんがい）：幾樓？何番（なんばん）：幾號？",ex:[{j:"これは いくらですか。—5000えんです。",t:"這個多少錢？—5000日圓。"},{j:"でんわばんごうは なんばんですか。",t:"電話號碼是幾號？"}]},
],
4:[
{p:"時間の言い方（時刻の詳細）",e:"〜時（じ）：點。〜分（ふん/ぷん）：分。午前（ごぜん）AM / 午後（ごご）PM。半（はん）：半，即30分。12時は よる 12じ（夜間）或 ひる 12じ（中午）。",ex:[{j:"いまは ごぜん 9じ はんです。",t:"現在是上午9點半。"},{j:"かいぎは ごご 2じ 30ぷんから です。",t:"會議是從下午2點30分開始。"}]},
{p:"〜ごろ（大約・左右）",e:"ごろ 表示大約的時間點，不精確。〜ごろ 只用於時間點，不用於期間（期間用〜くらい）。「3時ごろ」是「大約3點左右」。",ex:[{j:"7じごろ おきます。",t:"大約7點左右起床。"},{j:"なんじごろ かえりますか。",t:"大約幾點左右回家？"}]},
{p:"曜日・月・日付（星期・月份・日期）",e:"星期：にちようび（日）・げつようび（月）…どようび（土）。月：いちがつ〜じゅうにがつ。日：ついたち（1日）・ふつか（2日）…はつか（20日）。",ex:[{j:"かいぎは もくようびです。",t:"會議是星期四。"},{j:"たんじょうびは なんがつ なんにちですか。",t:"生日是幾月幾號？"},{j:"やすみは いちがつ ついたちから みっかまでです。",t:"假期是1月1號到3號。"}]},
],
5:[
{p:"移動動詞の方向（行き先・出発点）",e:"行きます（いきます）・来ます（きます）・帰ります（かえります）の違い：「来る」是往說話者方向移動，「行く」是離開說話者，「帰る」是回到根據地（家・國家等）。",ex:[{j:"あした とうきょうへ いきます。",t:"明天去東京。"},{j:"ははが こちらへ きます。",t:"媽媽要來這裡。"},{j:"くにへ かえります。",t:"回國了。"}]},
{p:"〜で（手段・交通工具）",e:"で 表示動作使用的手段/工具/交通工具。「〜に のります」是「搭乘〜」（具體的上車動作），「〜で いきます」是「用〜方式去」（手段）。",ex:[{j:"でんしゃで かいしゃへ いきます。",t:"搭電車去公司。"},{j:"あるいて えきへ いきます。",t:"走路去車站。"},{j:"ひこうきで にほんへ いきます。",t:"搭飛機去日本。"}]},
{p:"〜と（一起・共同）",e:"と 接在人物後，表示「和〜一起」。誰と？（和誰一起？）可回答：ひとりで（一個人）・かぞくと（和家人）・ともだちと（和朋友）。",ex:[{j:"ともだちと えいがを みます。",t:"和朋友看電影。"},{j:"だれと いきますか。",t:"和誰去？"},{j:"ひとりで りょこうします。",t:"一個人旅行。"}]},
],
6:[
{p:"〜を（目的語）の詳細",e:"を 接在動詞直接受詞後。他動詞（外力作用の動詞）：食べる・飲む・見る・聞く・読む・書く・買う・する等，後面接を。注意：好き・嫌い・わかる・できる 後接が，不接を。",ex:[{j:"まいあさ コーヒーを のみます。",t:"每天早上喝咖啡。"},{j:"テレビを みます。",t:"看電視。"},{j:"にほんごが すきです。（×にほんごを）",t:"喜歡日文。（が，不是を）"}]},
{p:"〜で（動作の場所）",e:"で 表示動作發生的場所。「どこで？（在哪裡做？）」に 是存在的位置（いる・ある），で 是動作進行的場所（食べる・飲む・する等）。",ex:[{j:"このちかくの レストランで ひるごはんを たべます。",t:"在附近的餐廳吃午餐。"},{j:"としょかんで べんきょうします。",t:"在圖書館讀書。"},{j:"どこで かいますか。",t:"在哪裡買？"}]},
{p:"〜を（場所）通る・歩く動詞",e:"通過・移動系動詞：〜を あるきます（走過〜）・〜を わたります（渡過〜）・〜を まがります（轉過〜）。此時を是「通過的場所」，不是目的語。",ex:[{j:"こうえんを さんぽします。",t:"在公園散步。"},{j:"はしを わたります。",t:"過橋。"}]},
],
7:[
{p:"助詞のまとめ：に・へ・で・を・と・から・まで",e:"に：時間点・存在場所・到達点・目的。へ：方向（いきます等）。で：手段・動作場所。を：目的語・通過場所。と：共同・引用。から：起点・原料。まで：終点。",ex:[{j:"7じに おきて、でんしゃで かいしゃへ いきます。",t:"7點起床，搭電車去公司。"},{j:"にほんから きました。",t:"從日本來的。"}]},
{p:"頻度の副詞（いつも・よく・時々・たまに・あまり・全然）",e:"頻度由高到低：いつも（總是）→ よく（常常）→ 時々（有時）→ たまに（偶爾）→ あまり〜ない（不太）→ ぜんぜん〜ない（完全不）。あまり・ぜんぜん 後面必須接否定形。",ex:[{j:"まいにち にほんごを べんきょうします。",t:"每天讀日文。"},{j:"あまり テレビを みません。",t:"不太看電視。"},{j:"おさけは ぜんぜん のみません。",t:"完全不喝酒。"}]},
{p:"〜に（目的・向かう対象）",e:"に 的目的用法：Vます形（去ます）＋に＋いく/くる/かえる。「何をしに行く？」的回答。進一步說明去某地的目的。",ex:[{j:"スーパーへ かいものに いきます。",t:"去超市買東西。"},{j:"にほんへ にほんごを べんきょうしに きました。",t:"來日本學日文。"}]},
],
8:[
{p:"て形の作り方（活用一覧）",e:"グループ1（-u動詞）：書く→書いて、飲む→飲んで、行く→行って（例外）、話す→話して。グループ2（-ru動詞）：食べ→食べて、見→見て。グループ3：する→して、くる→きて。",ex:[{j:"かきます→ かいて　　のみます→ のんで",t:"書きます→書いて　　飲みます→飲んで"},{j:"たべます→ たべて　　きます→ きて",t:"食べます→食べて　　来ます→来て"}]},
{p:"〜ています（進行・反復・習慣）",e:"進行中：いま テレビを みています（正在看）。習慣・反復：まいにち うんどうして います（每天運動）。状態継続（後で詳しく）：けっこんしています（已婚）。",ex:[{j:"いま あめが ふっています。",t:"現在正在下雨。"},{j:"まいあさ ジョギングを しています。",t:"每天早上慢跑（習慣）。"}]},
{p:"い形容詞・な形容詞の活用（現在・過去・否定）",e:"い形：〜い（肯定）/〜くない（否定）/〜かった（過去）/〜くなかった（過去否定）。な形：〜です/〜じゃないです/〜でした/〜じゃなかったです。",ex:[{j:"このりょうりは おいしい。おいしくない。おいしかった。",t:"好吃。不好吃。之前好吃。"},{j:"しずかです。しずかじゃないです。しずかでした。",t:"安靜。不安靜。之前安靜。"}]},
],
9:[
{p:"〜は〜が（主題と対象の分離）",e:"「わたしは ねこが すきです」：は は主題（話題），が は対象（すき・きらい・わかる・できる・ほしい 等の対象に が を使う）。好き・嫌い・上手・下手 は形容詞なので が で受ける。",ex:[{j:"わたしは からい たべものが にがてです。",t:"我不擅長/不喜歡吃辣的食物。"},{j:"スポーツは なにが すきですか。",t:"運動方面喜歡什麼？"}]},
{p:"〜より〜のほうが（比較の正式形）",e:"「AとBとどちらが〜ですか？」の答えは「Bのほうが〜です」。どちら（どっち）は二者の選択。三者以上はどれ・なにが一番。",ex:[{j:"コーヒーと こうちゃと どちらが すきですか。",t:"咖啡和紅茶哪個比較喜歡？"},{j:"コーヒーのほうが すきです。",t:"比較喜歡咖啡。"},{j:"りょうりのなかで なにが いちばん すきですか。",t:"料理之中最喜歡什麼？"}]},
{p:"程度の表現（とても・少し・あまり〜ない・〜すぎる）",e:"とても（非常）・まあまあ（還好）・すこし（一點）・あまり〜ない（不太）・ぜんぜん〜ない（完全不）。〜すぎる：「太〜了」，後接動詞/形容詞幹。",ex:[{j:"このもんだいは すこし むずかしいです。",t:"這個問題有點難。"},{j:"たべすぎて きぶんが わるいです。",t:"吃太多了，身體不舒服。"}]},
],
10:[
{p:"て形＋て形（動作の連続）",e:"て形を連続させて複数の動作を時系列で表す。前の動作が完了してから次の動作に進む感じ。〜てから は「完了を強調」，単純なて連結より前後関係が明確。",ex:[{j:"あさ おきて、シャワーを あびて、ごはんを たべます。",t:"早上起床，洗澡，然後吃飯。"},{j:"てを あらってから ごはんを たべます。",t:"洗完手後才吃飯。"}]},
{p:"形容詞のて形（〜くて・〜で）",e:"い形容詞：〜い→〜くて（寒い→寒くて）。な形容詞：〜な→〜で（静か→静かで）。形容詞のて形で複数の性質を連結，または理由を表す。",ex:[{j:"このへやは ひろくて あかるいです。",t:"這個房間又寬敞又明亮。"},{j:"かのじょは しんせつで あかるいです。",t:"她既親切又開朗。"},{j:"あたまが いたくて がっこうを やすみました。",t:"因為頭痛所以請假了。"}]},
{p:"〜てもいいですか vs 〜てはいけません（許可と禁止）",e:"〜てもいいですか：詢問是否允許（禮貌請求）。〜てもいいです：允許。〜てはいけません：禁止（比〜ないでください更正式・規定感強）。",ex:[{j:"しゃしんを とってもいいですか。—はい、どうぞ。",t:"可以拍照嗎？—可以，請便。"},{j:"ここで タバコを すっては いけません。",t:"這裡不可以抽菸。"}]},
],
11:[
{p:"助数詞（数え方）の一覧と注意点",e:"枚（まい）：紙・切符等平たいもの。本（ほん）：細長いもの、発音変化に注意（1本＝いっぽん、3本＝さんぼん、6本＝ろっぽん）。冊（さつ）：本・ノート。台（だい）：機械・乗り物。匹（ひき）：小動物。杯（はい）：飲み物。",ex:[{j:"きって を 3まい ください。",t:"請給我3張郵票。"},{j:"ビールを いっぽん ください。",t:"請給我一瓶啤酒。"},{j:"ねこを 2ひき かっています。",t:"養了2隻貓。"}]},
{p:"だけ vs しか〜ない（限定表現の対比）",e:"だけ：「只有〜」中性語気。しか〜ない：也是「只有〜」但必須接否定，語気更強，有「遺憾・不足感」。だけ ＋ 肯定 / しか ＋ 否定。意味は同じでも뉘앙스が違う。",ex:[{j:"3人だけ きました。",t:"只有3個人來了（陳述事實）。"},{j:"3人しか きませんでした。",t:"只有3個人來（好少啊，遺憾）。"},{j:"5ふんしか ありません。",t:"只剩5分鐘了（時間不夠）。"}]},
{p:"〜間（あいだ・かん）（期間の表現）",e:"期間：〜の あいだ（在〜期間內）・〜かん（持続時間）。2時間（にじかん）・1週間（いっしゅうかん）・3ヶ月（さんかげつ）・2年間（にねんかん）。",ex:[{j:"にほんに 1ねんかん いました。",t:"在日本待了1年。"},{j:"べんきょうして いるあいだ、おんがくを ききます。",t:"讀書期間聽音樂。"}]},
],
12:[
{p:"い形容詞の過去活用（〜かった・〜くなかった）",e:"い形容詞の過去：〜かったです（肯定）・〜くなかったです（否定）。注意：いい（良い）の過去は「よかったです」，「いかったです」は間違い。",ex:[{j:"きのうは とても さむかったです。",t:"昨天很冷。"},{j:"むかしは にぎやかじゃなかったです。",t:"以前不熱鬧。"},{j:"このえいがは よかったですね。",t:"這部電影真好看。"}]},
{p:"AはBより〜：比較の詳細",e:"「AはBより〜です」（A比B更〜）。疑問形：「AとBとどちらが〜ですか」。BよりAのほうが〜：更明確强調のほうが。差の表現：「〜より〜のほうが ずっと（はるかに）〜」。",ex:[{j:"なつより ふゆのほうが すきです。",t:"比起夏天更喜歡冬天。"},{j:"バスより でんしゃのほうが ずっと はやいです。",t:"電車比公車快多了。"}]},
{p:"季節・天気の表現",e:"季節：はる（春）・なつ（夏）・あき（秋）・ふゆ（冬）。天気：はれ（晴）・くもり（陰）・あめ（雨）・ゆき（雪）・かぜ（風）。〜になります：天気の変化を表す。",ex:[{j:"はるに なると、さくらが さきます。",t:"一到春天，櫻花就開了。"},{j:"あしたの てんきは くもりのち はれでしょう。",t:"明天的天氣是陰轉晴吧。"}]},
],
13:[
{p:"〜たいです vs 〜がほしいです（欲求の対比）",e:"たいです：動詞に接続，「做〜の行為をしたい」。ほしいです：名詞に接続，「物をほしい」。注意：他人の欲求を表すには〜たがっています・ほしがっています を使う（第三者の欲求は直接言えない）。",ex:[{j:"にほんへ いきたいです。",t:"想去日本。"},{j:"あたらしい パソコンが ほしいです。",t:"想要新電腦。"},{j:"こどもが アイスクリームを たべたがっています。",t:"小孩想吃冰淇淋（第三者）。"}]},
{p:"どこか・なにか・だれか・いつか（不定疑問詞）",e:"疑問詞＋か：不特定の「誰か・何か・どこか・いつか」。肯定文で使う。否定文では「だれも〜ない・なにも〜ない・どこにも〜ない」。",ex:[{j:"どこかへ いきたいです。",t:"想去某個地方（哪裡都好）。"},{j:"なにか のみたいです。",t:"想喝什麼（隨便什麼都可以）。"},{j:"どこにも いきませんでした。",t:"哪裡也沒去。"}]},
{p:"〜ために vs 〜に（目的の表現）",e:"〜ために（目的）：動詞原形＋ために。〜に：Vます形（去ます）＋に＋移動動詞。の違い：ために は一般的目的、に は移動動詞と組み合わせた目的。",ex:[{j:"けんこうの ために まいにち はしります。",t:"為了健康每天跑步。"},{j:"たべものを かいに スーパーへ いきます。",t:"去超市買食物（〜に＋移動動詞）。"}]},
],
14:[
{p:"〜てください vs 〜てもらえますか（依頼の丁寧度）",e:"丁寧度順序（低→高）：〜てください→〜てもらえますか→〜ていただけますか。〜てください は少し命令的，目上の人には〜てもらえますか以上を使う。",ex:[{j:"ちょっと まって ください。",t:"請稍等（一般請求）。"},{j:"もう すこし ゆっくり はなして もらえますか。",t:"可以說慢一點嗎（禮貌請求）。"}]},
{p:"道案内の表現（方向・場所の指示）",e:"まっすぐ（直走）・みぎ（右）・ひだり（左）に まがります（轉彎）・つぎの かど（下一個路口）・しんごう（紅綠燈）・〜をわたる（穿越）。",ex:[{j:"つぎの しんごうを みぎに まがって ください。",t:"請在下一個紅綠燈右轉。"},{j:"まっすぐ いくと、えきが みえます。",t:"直走的話可以看到車站。"}]},
{p:"〜ましょうか（申し出・提案）",e:"〜ましょうか：主動提議為對方做某事（申し出）。〜ましょう：邀請對方一起做（提案）。前者主語是説話者，後者包含對方。",ex:[{j:"かばんを もちましょうか。",t:"我來拿包包吧？（主動提議）"},{j:"いっしょに かえりましょうか。",t:"要不要一起回去？（邀請）"}]},
],
15:[
{p:"〜ている（状態の継続）の詳細",e:"〜ています の3つの意味：①進行中（いま〜している）②結果の継続（けっこんして いる＝已婚状態）③習慣・反復（まいにち〜して いる）。知っています（知っている）・持っています（持っている）・住んでいます は状態。",ex:[{j:"でんきが ついています。（状態継続）",t:"燈是開著的（有人開了，現在持續亮著）。"},{j:"かぎが かかっています。",t:"鎖著的（鎖上了的狀態）。"},{j:"このまちに 3ねん すんで います。",t:"在這個城市住了3年了。"}]},
{p:"許可・禁止・義務の表現（まとめ）",e:"許可：〜てもいいです / 〜てかまいません。禁止：〜てはいけません / 〜ないでください。義務：〜なければなりません / 〜なくてはいけません。不必要：〜なくてもいいです。",ex:[{j:"ここは くつを ぬいでも いいです。",t:"這裡可以脫鞋。"},{j:"しけんちゅうは はなして はいけません。",t:"考試中不可以說話。"},{j:"くすりを のまなければ なりません。",t:"必須服藥。"}]},
{p:"〜でいいです vs 〜がいいです（良いの違い）",e:"〜でいいです：「〜就可以了」（妥協・最低限）。〜がいいです：「〜比較好/想要〜」（希望・選択）。ニュアンスが重要。",ex:[{j:"コーヒーで いいです。",t:"咖啡就可以了（不特別要求）。"},{j:"コーヒーが いいです。",t:"我要咖啡（這個是我的希望）。"}]},
],
16:[
{p:"て形連結の注意（テンス・アスペクト）",e:"て形で動作をつなぐとき、全体のテンス（時制）は最後の動詞で決まる。「〜て〜て〜ます」なら現在・習慣，「〜て〜て〜ました」なら過去。途中の動詞はて形のまま。",ex:[{j:"あさ おきて、かおを あらって、かいしゃへ いきます。",t:"早上起床，洗臉，去公司（習慣・現在）。"},{j:"あさ おきて、かおを あらって、かいしゃへ いきました。",t:"早上起床，洗臉，去了公司（昨天的事）。"}]},
{p:"理由の〜から vs 〜ので（原因・理由）",e:"〜から：主観的理由，口語でよく使う。〜ので：客観的事実に基づく理由，丁寧・書き言葉的。どちらも「〜だから/ので〜」の意味。から は普通形でも丁寧形でも可。",ex:[{j:"あめが ふって いるから、かさを もって いきます。",t:"因為在下雨，所以帶傘去。"},{j:"あたまが いたいので、かえって もいいですか。",t:"因為頭痛，可以先回去嗎？（のでは柔和）"}]},
{p:"〜たあとで vs 〜てから（前後関係の表現）",e:"〜てから：前の動作をしてから後の動作（時系列が明確）。〜たあとで：前の動作が完了した後（動詞た形＋あとで）。ニュアンスの違いは微妙，ほぼ同じ意味で使える。",ex:[{j:"しゅくだいを してから あそびます。",t:"做完作業再玩。"},{j:"しょくじを したあとで コーヒーを のみます。",t:"吃完飯之後喝咖啡。"}]},
],
17:[
{p:"ない形（否定形）の作り方（活用一覧）",e:"グループ1：う段→あ段＋ない（書く→書かない・飲む→飲まない・待つ→待たない）。ある→ない（例外）。グループ2：〜る→〜ない（食べ→食べない）。グループ3：する→しない・くる→こない。",ex:[{j:"いかない・のまない・たべない・しない・こない",t:"不去・不喝・不吃・不做・不來"},{j:"あした かいしゃに いきません。（いかない の丁寧形）",t:"明天不去公司。"}]},
{p:"〜なければなりません の口語縮約",e:"なければなりません は長い。口語では：〜なきゃ（いけない）・〜なくちゃ（いけない）に短縮される。丁寧な場面では正式形を使うこと。",ex:[{j:"はやく いかなければ なりません。→ いかなきゃ！",t:"必須快點去。→ 得去了！（口語）"},{j:"くすりを のまなくちゃ。",t:"得吃藥了。（口語）"}]},
{p:"〜なくてもいいです（不必要の表現）",e:"「〜しなくていい」は義務がないことを表す。〜なくてもいいです ＝ 〜しても しなくても いい。反対：〜なければなりません（義務）。",ex:[{j:"あしたは はやく こなくても いいですよ。",t:"明天不用早來也沒關係。"},{j:"ぜんぶ たべなくても いいです。",t:"不用全部吃完也可以。"}]},
],
18:[
{p:"〜ことができます vs 可能形（能力の表現）",e:"〜ことができます：フォーマル・書き言葉的。可能形（〜える/〜られる）：口語的・日常会話で多用。意味は同じ。可能形：グループ1 う→える段（書く→書ける），グループ2 〜られる（食べられる），グループ3 できる/来られる。",ex:[{j:"わたしは にほんごを はなす ことが できます。",t:"我能說日文（正式）。"},{j:"にほんごが はなせます。",t:"能說日文（口語）。"}]},
{p:"〜ことです（名詞化）の用法",e:"動詞原形＋こと で動詞句を名詞化。「わたしの しゅみは〜こと」「たいせつなことは〜こと」等。こと＝thing/the act of。の も名詞化できるが、こと はより形式的・抽象的。",ex:[{j:"わたしの しゅみは えを かく ことです。",t:"我的興趣是畫畫。"},{j:"いちばん たいせつな ことは けんこうです。",t:"最重要的事是健康。"}]},
{p:"時の表現（〜まえに・〜てから・〜たあとで・〜とき）",e:"まえに：動詞原形＋まえに（動作前），名詞＋のまえに。てから：て形＋から（完了後）。たあとで：た形＋あとで（完了後）。とき（時）：動詞原形/た形＋とき（する時/した時，意味が違う）。",ex:[{j:"ねる まえに はを みがきます。",t:"睡前刷牙。"},{j:"くすりを のんでから ねます。",t:"吃藥之後睡覺。"}]},
],
19:[
{p:"〜たことがあります（経験）の詳細",e:"「〜たことがあります」：過去の経験。「〜たことがありません」：経験なし。回数の表現：1度/1回（いちど/いっかい）・何度も（なんども）・一度も〜ない（一次也沒有）。",ex:[{j:"にほんへ いったことが ありますか。—はい、2かいあります。",t:"去過日本嗎？—有，去過2次。"},{j:"すもうを いちども みた ことが ありません。",t:"相撲一次都沒看過。"}]},
{p:"〜たり〜たりします（列挙）の詳細",e:"〜たり〜たりします：動作を例として挙げる（全部言わなくてもいい）。活動の例示・交互動作に使う。〜たりして は「〜したりして困る」等否定的事も言える。",ex:[{j:"しゅうまつは ほんを よんだり、えいがを みたり します。",t:"週末讀讀書、看看電影（舉例，不是全部活動）。"},{j:"かれは くるかも しれないし、こないかも しれない。こんなことしたり して こまります。",t:"他可能來也可能不來，這樣搞令人煩惱。"}]},
{p:"〜くなります・〜になります（変化の表現）",e:"変化：い形容詞→〜くなります（寒くなる）。な形容詞・名詞→〜になります（静かになる・先生になる）。反対：〜くなくなります/〜じゃなくなります。",ex:[{j:"さいきん にほんごが じょうずに なりました。",t:"最近日文變好了。"},{j:"これから だんだん さむく なります。",t:"從現在起會漸漸變冷。"},{j:"はるに なりました。",t:"變成春天了（到了春天）。"}]},
],
20:[
{p:"普通形（辞書形）の一覧",e:"丁寧形→普通形：〜ます→〜る（食べます→食べる）、行きます→行く、〜ません→〜ない、〜ました→〜た、〜ませんでした→〜なかった。名詞・な形容詞：です→だ/である、じゃないです→じゃない、でした→だった。",ex:[{j:"たべます→たべる、いきます→いく、やすみます→やすむ",t:"丁寧形→普通形（現在肯定）"},{j:"たべません→たべない、いきませんでした→いかなかった",t:"丁寧形否定/過去否定→普通形"}]},
{p:"口語の文末表現（〜じゃん・〜よね・〜かな・〜んだ）",e:"じゃん（〜じゃないか）：発見・確認。よね：確認求める。かな：独り言・疑問。んだ：理由・説明・発見。これらは口語専用，丁寧な場では使わない。",ex:[{j:"あ、かれ きた じゃん！",t:"啊，他來了嘛！"},{j:"もう 3じか。はやいな〜。",t:"已經3點了啊。好快啊〜（獨白）"},{j:"このみせ、やすいんだ！",t:"這家店好便宜啊！（發現）"}]},
{p:"カジュアル日本語の会話パターン",e:"友達との会話では：省略（「もう食べた？」ではなく「食べた？」）・短縮（〜なきゃ・〜じゃん）・疑問は語尾上げ（「いく？」）・〜ね・〜よ・〜かな 多用。",ex:[{j:"きのう、どこ いったの？",t:"昨天去哪了？（口語）"},{j:"べんきょう した？—まだ〜。",t:"讀書了嗎？—還沒〜"}]},
],
21:[
{p:"〜と思います（引用・意見）の細かい使い方",e:"思います の前は普通形。「〜と思っています」：現在もそう思い続けている。「〜と思いました」：その時にそう思った（もう変わったかも）。否定：「〜ないと思います」（〜と思いません は間違い）。",ex:[{j:"かれは きっと くると おもいます。",t:"我認為他一定會來。"},{j:"あした あめが ふらないと おもいます。",t:"我認為明天不會下雨（否定用ない＋と思う）。"}]},
{p:"〜でしょう・〜かもしれません・〜はずです（推量の区别）",e:"でしょう：話者の推量，较有把握（天気予報でよく使う）。かもしれません：不確かな推量（50%以下）。はずです：根拠のある推量，「当然〜のはず」（约70-80%）。",ex:[{j:"たぶん あしたは はれるでしょう。",t:"明天大概是晴天吧（天氣預報口吻）。"},{j:"かれは もう かえったかも しれません。",t:"他也許已經回去了（不確定）。"},{j:"でんしゃは もう きている はずです。",t:"電車應該已經來了（有根據的推測）。"}]},
{p:"〜らしいです・〜ようです・〜みたいです（様子の推量）",e:"らしいです：有根拠の推量，伝聞に近い。ようです：外観・様子からの判断（書き言葉的）。みたいです：ようですの口語版。",ex:[{j:"かれは かぜを ひいた らしいです。",t:"他好像感冒了（聽說・有根據）。"},{j:"となりで おおきい こえが して います。けんかを して いる ようです。",t:"隔壁有很大的聲音，好像在吵架。"}]},
],
22:[
{p:"普通形による名詞修飾（関係節）",e:"「動詞・形容詞の普通形＋名詞」で名詞を修飾する。英語のwho/which/thatに相当。修飾節の中の主語はが で受ける（は は使わない）。「わたしが 読んだ本」は「わたしは 読んだ本」ではない。",ex:[{j:"むかし すんで いた まちに また いきたいです。",t:"想再去以前住過的城市。"},{j:"きのう みた えいがは とても よかったです。",t:"昨天看的電影很好看。"}]},
{p:"〜の（こと）・〜のを・〜のが（名詞節の格助詞）",e:"の が名詞節を作るとき、後続する格助詞と組み合わさる。〜のが好き（喜歡做〜）・〜のを見た（看到〜做）・〜のは〜です（〜這件事是〜）。",ex:[{j:"うたを うたうのが すきです。",t:"喜歡唱歌。"},{j:"かれが はしって いるのを みました。",t:"看到他在跑。"}]},
{p:"〜という・〜と言われている（引用・伝達）",e:"という：名前・概念の引用説明「〜という人/場所/言葉」。と言われている：「一般的に言われていること」，社会的通念の表現。",ex:[{j:"「さくら」という えいがを みましたか。",t:"有看過叫「さくら」的電影嗎？"},{j:"にほんは きれいな くにだと いわれています。",t:"日本據說是個很漂亮的國家。"}]},
],
23:[
{p:"〜とき（時）の詳細（前後のテンス）",e:"「動詞原形＋とき」：まだその動作をしていない時点。「動詞た形＋とき」：その動作が完了した後の時点。例：でかける とき かぎを かけます（出門前關門）vs でかけた とき かぎを かけました（出門後）。",ex:[{j:"にほんへ いく とき、ビザが ひつようです。",t:"去日本的時候需要簽證（還沒去）。"},{j:"にほんへ いった とき、ふじさんを みました。",t:"去日本的時候（已經去了）看了富士山。"}]},
{p:"〜と（自然的結果・必然的条件）",e:"「〜すると〜」：自然に起こること，規則，説明。意志的行為の命令・依頼・勧誘 には使えない。「右に曲がると駅があります」（事実説明）は○，「右に曲がると行ってください」は×。",ex:[{j:"このボタンを おすと、おゆが でます。",t:"按下這個按鈕，就會出熱水。"},{j:"はるに なると、あたたかくなります。",t:"一到春天就會變暖（自然現象）。"}]},
{p:"道の聞き方・答え方（交通・場所案内）",e:"どうやって いきますか（怎麼去？）・〜から〜に のって（從〜搭〜）・〜で おります（在〜下車）・〜に のりかえます（換乘〜）・〜ぐらい かかります（需要約〜時間）。",ex:[{j:"えきから どうやって いきますか。",t:"從車站怎麼去？"},{j:"バスで 15ふんぐらい かかります。",t:"搭公車大約需要15分鐘。"}]},
],
24:[
{p:"授受動詞の全体像（あげる・もらう・くれる）",e:"あげます：私→他人（我給別人）。もらいます：私←他人（我從別人得到）。くれます：他人→私（別人給我）。敬語：さしあげます（あげるの謙讓）・いただきます（もらうの謙讓）・くださいます（くれるの尊敬）。",ex:[{j:"わたしは ははに ケーキを あげました。",t:"我給了媽媽蛋糕。"},{j:"ははは わたしに ケーキを くれました。",t:"媽媽給了我蛋糕。"},{j:"ははから ケーキを もらいました。",t:"從媽媽那裡拿到了蛋糕。"}]},
{p:"〜てあげる・〜てもらう・〜てくれる（恩恵の授受）",e:"行為に対して授受動詞を使い「恩恵」を表現。〜てあげる：行為の恩恵を与える。〜てもらう：行為の恩恵を受ける（頼む）。〜てくれる：相手の行為から恩恵を受ける。",ex:[{j:"ともだちが てつだって くれました。",t:"朋友幫助了我。"},{j:"ともだちに てつだって もらいました。",t:"請朋友幫忙了。"},{j:"ともだちに てつだって あげました。",t:"幫助了朋友。"}]},
{p:"〜てもらえますか・〜ていただけますか（丁寧依頼）",e:"〜てくれますか（普通）→〜てもらえますか（丁寧）→〜ていただけますか（最も丁寧）。ビジネス・初対面・目上の人には ていただけますか を使う。",ex:[{j:"すみません、しゃしんを とって もらえますか。",t:"不好意思，可以幫我拍照嗎？"},{j:"もう いちど せつめいして いただけますか。",t:"可以請您再說明一次嗎？（非常禮貌）"}]},
],
25:[
{p:"〜たら vs 〜と vs 〜ば vs 〜なら（条件の総整理）",e:"4種の条件：①たら：仮定・完了後（もし〜したら）②と：自然結果・必然（〜すると必ず〜）③ば：仮定・希望（〜すればいいのに）④なら：前提・相手の話を受けて（〜するなら〜した方がいい）",ex:[{j:"もし かねが あったら、りょこうします。",t:"如果有錢的話，就去旅行。"},{j:"もし かねが あれば、りょこうできるのに。",t:"如果有錢的話，就可以去旅行了（帶有遺憾）。"}]},
{p:"〜ても（逆接・譲歩）",e:"「〜ても」：「即使〜也〜」，どんなに〜ても（無論多〜也）。前件と後件が反対の結果になる。意志動詞の場合は不変の意志を示す：「雨が降っても行きます」。",ex:[{j:"どんなに いそがしくても、かならず れんらくします。",t:"無論多忙，一定聯絡你。"},{j:"たかくても、このかばんが ほしいです。",t:"即使貴，也想要這個包包。"}]},
{p:"〜ておいてください（事前準備の依頼）",e:"〜ておく：事前に準備する（未来のために今やっておく）。依頼形：〜ておいてください。口語では〜といてください に短縮される。",ex:[{j:"かいぎの まえに しりょうを よんで おいて ください。",t:"請在會議前先把資料讀過。"},{j:"ドアを あけて おきます。",t:"先把門打開（以備之後需要）。"}]},
],
26:[
{p:"〜ば〜ほど（越…越…）",e:"〜ばほど：前件と後件が比例して増大する。動詞ば形＋動詞原形＋ほど。い形容詞：〜ければ〜いほど。な形容詞：〜であれば〜なほど。",ex:[{j:"れんしゅうすれば するほど、じょうずに なります。",t:"越練習越進步。"},{j:"やすければ やすいほど いいです。",t:"越便宜越好。"},{j:"にほんごは べんきょうすれば するほど むずかしくなる。",t:"日文越讀越難（深度越來越高）。"}]},
{p:"〜のに（逆接：出乎意料）",e:"〜のに：前件と後件の内容が予想に反する逆接。話者の不満・驚き・遺憾を含むことが多い。〜けど/〜が も逆接だが、のに は感情的色彩が強い。",ex:[{j:"あんなに べんきょうしたのに、しけんに おちました。",t:"明明那麼用功，還是考試不及格了。"},{j:"たかいのに、あまり おいしくないですね。",t:"明明那麼貴，卻不怎麼好吃。"}]},
{p:"〜ようになります（変化の到達点）",e:"〜ようになる：ある状態への変化を表す。できなかったことができるようになった、しなかったことをするようになった等。〜くなる は形容詞の変化，ようになる は動詞句の変化。",ex:[{j:"にほんごが はなせる ように なりました。",t:"變得能說日文了（以前不會，現在會了）。"},{j:"まいあさ はやく おきる ように なりました。",t:"變得每天早起了（以前做不到）。"}]},
],
27:[
{p:"〜ようにしてください（習慣的な依頼・指示）",e:"〜ように してください：「請養成〜的習慣」，比〜してください 更強調持續性・努力的方向。〜ないように してください：「請不要〜」（行動抑制的要求）。",ex:[{j:"まいにち にっきを かく ように して ください。",t:"請每天寫日記（養成習慣）。"},{j:"ちこく しない ように して ください。",t:"請不要遲到（努力避免）。"}]},
{p:"〜てしまいます（完了・遺憾）",e:"〜てしまう：①完全完了（全部做完了）②遺憾・後悔（本來不想但做了）。口語では〜ちゃう/〜ちゃった に短縮。文脈で意味が変わる。",ex:[{j:"しゅくだいを わすれて しまいました。",t:"把作業忘掉了（遺憾）。"},{j:"ケーキを ぜんぶ たべて しまいました。",t:"把蛋糕全吃完了（完了・或有點後悔）。"},{j:"あ、こわして しまった！",t:"啊，弄壞了！（口語：こわしちゃった）"}]},
{p:"〜てみます（試著做）",e:"〜てみる：「試著做〜，看看結果如何」。試行・挑戦の意味。結果は未知。〜てみたい は「想試試〜」。",ex:[{j:"このりょうりを たべて みて ください。",t:"請試著吃吃看這道料理。"},{j:"いちど にほんに すんで みたいです。",t:"想試著在日本住看看。"},{j:"でんわして みましたが、でませんでした。",t:"試著打了電話，但沒接。"}]},
],
28:[
{p:"〜ていきます・〜てきます（方向性のある変化）",e:"〜ていく：現在から未来へ向かう変化・動作（だんだん〜ていく）。〜てくる：過去から現在まで変化・動作が続いてきた（ずっと〜てきた）。また文字通りに「〜して行く/来る」移動動詞としても使う。",ex:[{j:"きおんが だんだん さがって いきます。",t:"氣溫漸漸下降下去（未來方向）。"},{j:"ずっと にほんごを べんきょうして きました。",t:"一直以來持續學習日文（過去到現在）。"}]},
{p:"〜てある（意図的な結果の状態）",e:"〜てある：誰かが意図的に行った行為の結果が残っている状態。〜ている との違い：てある は他動詞＋結果の継続（誰かがした），ている は状態の継続（自動詞も可）。",ex:[{j:"つくえの うえに かみが おいて あります。",t:"桌上放著紙（有人特意放在那裡）。"},{j:"よやくが して あります。",t:"已經訂好位了（有人事先訂的）。"}]},
{p:"〜ておく（準備・事前行動）",e:"〜ておく：後のために今やっておく。目的：準備・維持・今のうちに。口語短縮：〜とく（やっとく・しとく等）。",ex:[{j:"やさいを きって おきます。",t:"先把蔬菜切好（備用）。"},{j:"れんらく先を かいて おいて ください。",t:"請事先記下聯絡方式。"},{j:"もう よんどいた。",t:"已經先讀過了（口語）。"}]},
],
29:[
{p:"〜くれる vs 〜もらう（受益表現の視点の違い）",e:"視点：くれる は「相手が私に与えてくれる」（相手主語）。もらう は「私が相手から受け取る」（私主語）。意味は近いが文の主語が違う。",ex:[{j:"せんせいが おしえて くれました。",t:"老師教了我（老師是主語）。"},{j:"せんせいに おしえて もらいました。",t:"讓老師教了我（我是主語）。"},{j:"どちらも「老師教了我」という意味だが視点が違う。",t:"兩句意思相同，但說話角度不同。"}]},
{p:"〜させてもらえますか（謙虚な許可申請）",e:"させてもらう：「讓我做〜（拜託對方允許自己做）」。させていただく はさらに丁寧な形，ビジネスでよく使う。〜させてください よりも謙虚な印象。",ex:[{j:"少し かんがえさせて もらえますか。",t:"可以讓我想一下嗎？"},{j:"しりょうを はいけんさせて いただけますか。",t:"可以讓我拜讀一下資料嗎？（ビジネス丁寧）"}]},
{p:"〜ていただけませんか（最上级の丁寧依頼）",e:"丁寧依頼の段階：〜てください→〜てもらえますか→〜ていただけますか→〜ていただけませんか（否定疑問で最も丁寧）。目上・初対面・ビジネスでは最上級を使う。",ex:[{j:"もう いちど せつめいして いただけませんか。",t:"可以請您再說明一次嗎？（最禮貌）"},{j:"おなまえを おしえて いただけませんか。",t:"可以請您告訴我您的大名嗎？"}]},
],
30:[
{p:"〜そうです（様態推量）の細かい用法",e:"〜そうです の二種類：①様態（看起來要〜）：動詞ます形・い形容詞語幹・な形容詞語幹＋そう②伝聞（聽說〜）：普通形＋そうです。見た目の判断（①）と情報の伝達（②）は全く意味が違う。",ex:[{j:"あめが ふりそうです。（様態：雲を見て）",t:"看起來快下雨了。"},{j:"あした あめが ふるそうです。（伝聞：天気予報で）",t:"聽說明天會下雨。"},{j:"おいしそう！（様態：見た目で）",t:"看起來很好吃！"}]},
{p:"〜はずです・〜はずがありません",e:"はずです：根拠ある推測「当然〜のはず」（有根據的推測，約70〜80%の確信）。はずがない：「絕對不可能〜」（否定的確信）。",ex:[{j:"かれは もう しって いる はずです。",t:"他應該已經知道了（有根據推測）。"},{j:"かのじょが うそを つく はずが ありません。",t:"她絕對不可能說謊。"}]},
{p:"〜らしい vs 〜ようだ vs 〜みたいだ（推量の比較）",e:"らしい：伝聞・証拠があっての推量（書き言葉も可）。ようだ：外観や状況からの客観的判断（書き言葉的）。みたいだ：ようだ の口語版。ニュアンス差は微妙だが らしい は「聞いた情報」感が強い。",ex:[{j:"かれは びょうきらしいです。（伝聞）",t:"聽說他生病了。"},{j:"かれは びょうきのようです。（様子からの判断）",t:"他好像生病了（從樣子判斷）。"}]},
],
31:[
{p:"受身形（受動態）の作り方と意味",e:"受身：〜られます。グループ1：う段→あ段＋れる（書く→書かれる・飲む→飲まれる）。グループ2：〜られる（食べられる）。グループ3：される・こられる。被害の受身：〜に〜られて困る（被動被害）。",ex:[{j:"どろぼうに さいふを ぬすまれました。",t:"被小偷偷了錢包（被害受身）。"},{j:"この えいがは せかいじゅうで みられて います。",t:"這部電影在全世界被觀看（一般受身）。"}]},
{p:"〜に〜られる（被害の受身の詳細）",e:"被害受身：主語が意図せず被害を受ける。に は動作主（加害者）。特徴：日本語の受身は被害のニュアンスが強い。「雨に降られた」（被雨淋到，感覚的には被害）も被害受身。",ex:[{j:"となりの ひとに タバコを すわれて こまりました。",t:"被隔壁的人抽菸搞得很困擾。"},{j:"こどもに ないて、ねむれませんでした。",t:"被小孩哭聲吵得睡不著。"}]},
{p:"受身と能動の書き換え",e:"能動文→受身文：「AがBをVた」→「BがAにVられた」。目的語が主語になる。社会一般的な受身（〜は〜によって〜される）はフォーマルな書き言葉に多い。",ex:[{j:"せんせいが がくせいを ほめました。→ がくせいが せんせいに ほめられました。",t:"老師稱讚了學生。→ 學生被老師稱讚了。"},{j:"みんなが かれを しんらいしています。→ かれは みんなに しんらいされています。",t:"→ 他被大家信任著。"}]},
],
32:[
{p:"使役形（させる形）の作り方",e:"使役：〜させます。グループ1：う段→あ段＋せる（書く→書かせる・飲む→飲ませる）。グループ2：〜させる（食べさせる）。グループ3：させる・こさせる。意味：①強制（讓/叫〜做）②許可（讓〜做）。",ex:[{j:"はははたべたくないこどもに やさいを たべさせました。",t:"媽媽讓不想吃的孩子吃了蔬菜（強制）。"},{j:"しゃちょうは わたしに かいぎに でさせて くれました。",t:"社長讓我出席了會議（許可）。"}]},
{p:"使役の助詞：を vs に",e:"使役文の助詞：①強制の場合：自動詞→に（行かせる）または を（本人の意志で行く場合），他動詞→に。②許可の場合：自動詞→を（自由に動かせるので を で通過感）。",ex:[{j:"こどもを / に がっこうへ いかせます。",t:"讓孩子去學校。（自動詞なので両方可）"},{j:"こどもに やさいを たべさせます。",t:"讓孩子吃蔬菜。（他動詞はに）"}]},
{p:"使役受身（〜させられる）",e:"使役受身：「（したくないのに）させられる」＝「被迫做〜」。使役形＋受身形の組み合わせ。グループ1：〜させられる（書かせられる）。口語短縮：〜さされる（かかされる）。",ex:[{j:"こどものころ、まいにち ピアノを れんしゅうさせられました。",t:"小時候每天被迫練鋼琴。"},{j:"かいぎで スピーチを させられました。",t:"在會議上被迫做了演講。"}]},
],
33:[
{p:"〜ても〜ても（両方試みても無効）",e:"〜ても〜ても：どんな努力をしても結果が変わらない表現。「いくら〜ても」「何度〜ても」と組み合わせることが多い。",ex:[{j:"いくら ねても ねても、ねむいです。",t:"不管睡多少都還是想睡。"},{j:"なんど ためしても うまくいきません。",t:"試了幾次都不順利。"}]},
{p:"〜ことになっています（規則・慣習・決定事項）",e:"〜ことになっている：社会的ルール・取り決め・慣習を表す。「〜することに決まっている（客観的事実）」。〜ことにしている は「自分が決めた習慣」（主観的決意）。",ex:[{j:"このへやでは きつえんは きんしされて いることになっています。",t:"這個房間規定不可以抽菸。"},{j:"まいあさ 6じに おきること に しています。",t:"我規定自己每天早上6點起床（自己的決定）。"}]},
{p:"〜わけです・〜わけにはいきません",e:"わけです：理由・結論の論理的導き出し（「原來如此」「所以才〜」）。わけにはいきません：「不能〜（基於道理・義務・常識上）」，NOT ためにはいけません（物理的不可能）とは違う。",ex:[{j:"彼は にほんに 10ねん すんでいた。 だから、にほんごが じょうずな わけです。",t:"他在日本住了10年，難怪日文這麼好。"},{j:"しごとがある から、りょこうに いくわけにはいきません。",t:"因為有工作，不能去旅行（道義上不能去）。"}]},
],
34:[
{p:"〜ばよかった（後悔・反実仮想）",e:"〜ばよかった：「應該〜的（但沒做，後悔）」。〜なければよかった：「早知道不〜就好了（後悔做了）」。過去の後悔を表す定番表現。",ex:[{j:"もっと べんきょうすれば よかったです。",t:"當時應該多讀書的（後悔）。"},{j:"あんなこと いわなければ よかった。",t:"早知道那種話就不說了（後悔說了）。"}]},
{p:"〜のではないかと思います（婉曲な意見表明）",e:"のではないか：「不是〜嗎？（我這樣認為）」，直接言いにくい意見を婉曲に述べる表現。〜と思います より不確かだが，ビジネス・議論の場で丁寧に意見を言うのに便利。",ex:[{j:"このやりかたは ちょっと むずかしいのでは ないかと おもいます。",t:"我認為這個做法可能有點困難（婉曲意見）。"},{j:"かれが しっている のでは ないでしょうか。",t:"他應該知道吧？（婉曲推測）"}]},
{p:"〜にしても〜にしても（どちらにしても）",e:"〜にしても〜にしても：「無論是A還是B，結果都是〜」。二者択一でも結論は同じ場合に使う。〜にしろ〜にしろ も同じ意味（より書き言葉的）。",ex:[{j:"いくにしても いかないにしても、はやく きめなければ なりません。",t:"無論去不去，都必須盡快決定。"},{j:"あめにしても ゆきにしても、でかけます。",t:"無論下雨還是下雪，都要出門。"}]},
],
35:[
{p:"〜ながら（二つの動作の同時進行）",e:"〜ながら：同じ主語が同時に二つの動作を行う。ながら の前の動作が「従」，後の動作が「主（メインの動作）」。主語が違う場合は使えない。",ex:[{j:"おんがくを きき ながら、べんきょうします。",t:"一邊聽音樂一邊讀書。"},{j:"はたらきながら、にほんごを べんきょうしています。",t:"一邊工作一邊學日文。"},{j:"まちがえながらも、まえに すすむ ことが たいせつです。",t:"即使犯錯，向前進很重要。（ながらも：逆接）"}]},
{p:"〜ながらも（逆接の同時）",e:"〜ながらも：同時の逆接「〜であるにもかかわらず〜」。前件の状態と後件の内容が矛盾していることを表す。",ex:[{j:"しんぱいしながらも、わらっています。",t:"雖然很擔心，卻還是在笑。"},{j:"わかっていながらも、やめられません。",t:"明明知道，卻停不下來。"}]},
{p:"〜というのは・〜ということ（説明・定義）",e:"〜というのは〜ということです：定義・説明の表現。「X というのはY のことです（X就是指Y）」。「〜ということ」は名詞節を作り「that節」に相当。",ex:[{j:"「さびしい」というのは「ひとりで さみしい きもち」ということです。",t:"「さびしい」就是「一個人孤獨的感覺」的意思。"},{j:"かれが けっこんした ということを ききました。",t:"聽說了他結婚了這件事。"}]},
],
36:[
{p:"〜ことにします（意志的決定）vs 〜ことになります（客観的決定）",e:"〜ことにします：自分の意志で決定する（我決定〜）。〜ことになります：外部の決定・自然な流れで決まる（變成〜了）。似ているが主体が違う。",ex:[{j:"らいねんから にほんで はたらく ことに しました。",t:"決定從明年起在日本工作（自己決定）。"},{j:"らいねんから にほんで はたらく ことに なりました。",t:"從明年起要在日本工作了（外部決定/自然流向）。"}]},
{p:"〜のだ・〜んです（説明・納得・強調）",e:"〜んです（〜のです）：理由説明・状況説明・発見・強調。会話では んですか？（是這樣嗎？/納得的確認）がよく使われる。単純疑問と んですか の違い：「どうしたんですか（怎麼了）」vs「どうしましたか（怎麼了—一般的）」。",ex:[{j:"どうして やすんだんですか。—かぜを ひいたんです。",t:"為什麼請假了？—因為感冒了（說明理由）。"},{j:"このみせ、やすいんですね！",t:"這家店很便宜呢！（發現・感嘆）"}]},
{p:"〜てほしいです（他者への希望）",e:"〜てほしいです：他人に〜して欲しいと思う（希望別人做〜）。〜てほしくないです：希望別人不要做。〜たいです（自分がしたい）とは主体が違うので注意。",ex:[{j:"もっと はやく れんらくして ほしかったです。",t:"希望你早點聯絡我的（遺憾）。"},{j:"かのじょに わかって ほしいです。",t:"希望她能理解。"}]},
],
37:[
{p:"〜ような・〜ように（比喩・目標）",e:"ように：目標（〜できるように努力する）・比喩（〜のように＝像〜一樣）。ような：名詞修飾の比喩（〜のような＋名詞）。例：かれのように はなせるように なりたい（想變得能像他一樣說話）。",ex:[{j:"かれの ように じょうずに はなせる ように なりたいです。",t:"想變得能像他一樣說得這麼好。"},{j:"こおりのように つめたい みずです。",t:"像冰一樣冷的水。"}]},
{p:"〜に対して（対象・対比）",e:"〜に対して：①対象「〜に対する態度/反応」（對於〜）②対比「Aに対してB（與A相對地，B〜）」。に对して の後には名詞・動詞両方可。〜について（關於）との違い：について は話題，に対して は向き合う対象。",ex:[{j:"しつもんに たいして こたえます。",t:"對於問題作出回答。"},{j:"ははは やさしいのに たいして、ちちは きびしいです。",t:"媽媽很溫柔，相對地爸爸很嚴格。"}]},
{p:"〜によって（手段・原因・差異）",e:"によって の多義：①手段/方法（〜によって達成する）②原因（〜によって起こる）③人による差異（人によって違う）④受身の動作主（〜によって書かれた）。文脈で意味を判断。",ex:[{j:"このもんだいは みんなで そうだんする ことによって、かいけつできます。",t:"這個問題可以透過大家討論來解決。"},{j:"ひとによって、かんがえかたが ちがいます。",t:"每個人的想法不同（因人而異）。"}]},
],
38:[
{p:"〜としたら・〜とすれば（仮定的考察）",e:"〜としたら/とすれば：「如果假設〜的話」，仮定や可能性のある状況について考える。〜たら より仮定性が高く，話者がある前提に立って考えている感じ。",ex:[{j:"もし あなたが にほんじんだとしたら、どこに すみたいですか。",t:"如果你是日本人的話，想住在哪裡？"},{j:"この けいかくが うまくいくとすれば、なんねん かかりますか。",t:"如果這個計畫能順利的話，需要幾年？"}]},
{p:"〜ところ（動作の局面を表す）",e:"〜ところ の3つの局面：①動詞原形＋ところ（正要做之前）②動詞て形＋いるところ（正在做中）③動詞た形＋ところ（剛剛做完）。「いま〜ところです」で現在の局面を表す。",ex:[{j:"いま、でかける ところです。",t:"正要出門的時候（出門前）。"},{j:"いま、ごはんを たべて いる ところです。",t:"正在吃飯中。"},{j:"いま、ごはんを たべた ところです。",t:"剛吃完飯。"}]},
{p:"〜はずだったのに（期待外れ・予定の崩れ）",e:"〜はずだったのに：「原本應該〜的，卻〜（落空）」。過去の予定や期待が実現しなかった遺憾。はずです（現在推測）とはずだった（過去の崩れた期待）は別物。",ex:[{j:"3じに くる はずだったのに、まだ きません。",t:"原本應該3點來的，卻還沒來。"},{j:"かんたんなはずだったのに、むずかしかったです。",t:"原本應該很簡單的，卻很難。"}]},
],
39:[
{p:"〜てくれてありがとうございます（感謝の表現）",e:"感謝の多様な表現：〜てくれてありがとう（謝謝你做了〜）・〜ていただいてありがとうございました（敬語）・おかげで〜（托你的福〜）・〜に感謝しています（對〜感謝）。",ex:[{j:"てつだって くれて ありがとうございます。",t:"謝謝你幫忙了。"},{j:"せんせいのおかげで、にほんごが じょうずになりました。",t:"托老師的福，日文變好了。"}]},
{p:"〜ために（原因・被害）vs 〜から/〜ので",e:"ために の原因用法：客観的事実から生じる結果（自然災害・病気等）に使いやすい。かぜを ひいたために やすんだ（因感冒而缺席）。〜から/ので は主観的理由にも使えるが，ために は書き言葉的・フォーマル。",ex:[{j:"じしんのために、けいかくが かわりました。",t:"因地震計畫有所改變（客觀原因）。"},{j:"びょうきのために、かいしゃを やすみました。",t:"因生病請假了公司。"}]},
{p:"〜上で（前提・した上で）",e:"〜した上で：「先做〜，然後再〜」（在做了〜的基礎上）。〜する上で：「在做〜這件事上，〜很重要」（〜にとって重要な点）。上で の前は動詞た形か名詞の。",ex:[{j:"よく かんがえた うえで、けっていします。",t:"充分考慮之後再決定。"},{j:"にほんごを まなぶ うえで、ぶんぽうは たいせつです。",t:"在學習日文這件事上，文法很重要。"}]},
],
40:[
{p:"〜まま（状態の継続・そのまま）",e:"〜まま：ある状態が変わらずに継続する。動詞た形＋まま（〜したままの状態で）・〜ない＋まま（〜しないままの状態で）・名詞の＋まま（そのままの状態で）。",ex:[{j:"くつを はいた まま、はいって しまいました。",t:"穿著鞋就進去了（沒脫鞋）。"},{j:"やくそくを まもらない まま、じかんが すぎました。",t:"在沒有遵守約定的狀態下，時間就過去了。"},{j:"おもった ままを いって ください。",t:"請直接說出你想的（原原本本地）。"}]},
{p:"〜にもかかわらず（逆接・書き言葉）",e:"〜にもかかわらず：「雖然〜（但卻〜）」。書き言葉的・フォーマルな逆接。〜のに より改まった印象。ビジネス文書・スピーチでよく使う。",ex:[{j:"あめにもかかわらず、おおぜいの ひとが あつまりました。",t:"儘管下雨，卻聚集了很多人。"},{j:"ねんれいにもかかわらず、げんきです。",t:"儘管上了年紀，還是很有精神。"}]},
{p:"〜かねます・〜かねません（ビジネス敬語）",e:"〜かねます：「難以做到〜（禮貌地拒絕）」，〜できません より柔らかい断り。〜かねません：「搞不好會〜（有不好的可能性）」，否定的可能性の警告。混同しないこと。",ex:[{j:"そのようなことは わたしには おこたえ しかねます。",t:"那樣的事我難以回答（禮貌拒絕）。"},{j:"このままでは、かいしゃが つぶれかねません。",t:"照這樣下去，公司有可能倒閉。"}]},
],
41:[
{p:"〜たとたん（直後の変化）",e:"〜たとたん（に）：「剛一〜，馬上就〜了」，動作の直後に別のことが起きる。「〜たらすぐに」に近いが，とたん は偶発的・予想外の出来事の感じが強い。",ex:[{j:"いえを でたとたんに、あめが ふりはじめました。",t:"剛一出門，馬上就開始下雨了。"},{j:"かれを みたとたん、こえが でなく なりました。",t:"一看到他，就說不出話來了。"}]},
{p:"〜きる・〜きれない（完全に・できないほど）",e:"〜きる：「完全に〜し終わる」（完全・徹底）。〜きれない：「多いので〜しきれない」（量的に無理）。読みきる（讀完），食べきれない（吃不完）。",ex:[{j:"この ほんは 1にちで よみきりました。",t:"這本書在一天之內讀完了。"},{j:"こんなに たくさん たべきれません。",t:"這麼多吃不完。"},{j:"いいたいことが いいきれませんでした。",t:"想說的話沒辦法全說完。"}]},
{p:"〜だけでなく〜も（〜不只〜，連〜也〜）",e:"〜だけでなく〜も：「不只是A，B也〜」。〜ばかりでなく〜も も同じ意味でやや強調。〜はもちろん〜も（〜自不用說，〜也〜）はさらに強い。",ex:[{j:"えいごだけでなく、にほんごも はなせます。",t:"不只英文，日文也會說。"},{j:"かれは うたが じょうずなだけでなく、えも じょうずです。",t:"他不只歌唱得好，畫也畫得好。"}]},
],
42:[
{p:"〜に関して・〜について（話題・関連）",e:"について：「關於〜（話題・主題）」，口語・書き言葉どちらでも使える。に関して：「有關〜（更正式・書き言葉的）」，に関しては・に関しても等の形でも使う。",ex:[{j:"にほんの ぶんかについて しらべています。",t:"正在研究有關日本文化的事。"},{j:"けいやくに かんして、ご ふめいな てん は ありますか。",t:"關於合約有沒有不清楚的地方？（ビジネス）"}]},
{p:"〜にとって（評価の基準となる対象）",e:"〜にとって：「對〜來說（從〜的角度看）」，評価や感想の基準となる人物・立場を示す。〜に対して（面向〜）とは違い，にとって は判断の立場を示す。",ex:[{j:"わたしにとって、にほんごは たのしい ことばです。",t:"對我來說，日文是有趣的語言。"},{j:"こどもにとって、あそびは たいせつです。",t:"對孩子來說，玩耍是重要的。"}]},
{p:"〜からといって（〜だからといって）",e:"〜からといって：「雖然說〜（但並不代表〜）」，前件の理由だけで後件を正当化することへの否定。",ex:[{j:"にほんごが すきだからといって、かんたんではありません。",t:"雖說喜歡日文，但並不代表就很簡單。"},{j:"おかねが あるからといって、しあわせとは かぎりません。",t:"即使有錢，也不一定就幸福。"}]},
],
43:[
{p:"〜さえ〜ば（さえ〜れば／それだけで十分）",e:"〜さえ〜ば：「只要〜就〜（那就夠了）」，最低限の条件を強調。〜も…さえ（連〜都〜：強調意外性）と区別する。",ex:[{j:"けんこうでさえ あれば、ほかは なにも いりません。",t:"只要健康，其他什麼都不需要。"},{j:"かんじさえ おぼえれば、にほんごが もっと よめます。",t:"只要記住漢字，日文就能讀得更多。"},{j:"かれは にほんごさえ できません。",t:"他連日文都不會（強調意外最低標準也沒達到）。"}]},
{p:"〜ことはない・〜にはあたらない（不必要・驚くに値しない）",e:"〜ことはない：「没必要〜」，義務・必要性の否定。〜にはあたらない：「〜するほどのことはない（不值得〜）」，書き言葉的・フォーマル。",ex:[{j:"そんなに しんぱいする ことはないよ。",t:"不必那麼擔心啦。"},{j:"それぐらいのことで おどろくに あたりません。",t:"那點程度的事不值得驚訝。"}]},
{p:"〜というより（むしろ〜）",e:"〜というより（むしろ）〜：「與其說是A，不如說是B」，前の表現を訂正したり，より正確な表現に置き換える。比較・訂正の表現。",ex:[{j:"かれは あかるい というより、うるさいです。",t:"與其說他開朗，不如說是吵鬧。"},{j:"このしごとは むずかしい というより、めんどうです。",t:"這工作與其說難，不如說是麻煩。"}]},
],
44:[
{p:"〜ようとする（意志的試み）",e:"〜ようとする：「試圖要〜（有意志地嘗試）」。〜ようとしたが〜できなかった（試圖〜但沒能〜）のように，行為が成功しなかった場合によく使う。〜てみる との違い：ようとする は意志の方向性，てみる は試行の経験。",ex:[{j:"ドアを あけようとしましたが、かぎが かかっていました。",t:"試圖開門，但鎖著。"},{j:"なにを いおうとしているのですか。",t:"你想說什麼？（試圖想說的內容）"}]},
{p:"〜まいとする・〜まい（否定の意志・推量）",e:"まい：①意志の否定「〜するまい（不打算〜）」②推量の否定「〜まい（應該不會〜）」。現代語ではあまり使わないが，文語・小説によく出る。口語では〜ないだろう/〜ないつもり等を使う。",ex:[{j:"もう あんな ことは すまいと おもっています。",t:"打算不再做那種事了（書き言葉的）。"},{j:"かれは もう こないだろう。（口語版）",t:"他應該不會再來了（口語）。"}]},
{p:"〜ものだ（当然・懐かし・感慨）",e:"〜ものだ の3用法：①当然の理・常識「〜するものだ（〜是理所當然的）」②過去の習慣・回想「〜たものだ（以前曾經〜）」③感嘆「〜ものですね（真的是〜呢）」。",ex:[{j:"わかいうちは、もっと べんきょうするものだ。",t:"年輕的時候應該多讀書的（一般道理）。"},{j:"こどものころ、よく ここで あそんだ ものです。",t:"小時候常常在這裡玩（懷念回想）。"}]},
],
45:[
{p:"〜からすると・〜から見ると（観点・判断根拠）",e:"〜からすると/〜からみると：「從〜來看/以〜的角度來判斷」。判断の根拠・観点を示す。似た表現：〜によると（根據〜/據說）・〜からいえば（從〜的角度說的話）。",ex:[{j:"がくせいのたちばからすると、じかんが たりません。",t:"從學生的立場來看，時間不夠。"},{j:"てんきよほうからみると、あしたは あめですね。",t:"從天氣預報來看，明天是雨天呢。"}]},
{p:"〜上は・〜以上は（決意・責任）",e:"〜上は/〜以上は：「既然〜，就（有責任〜）」，行動したり状況が決まったことへの責任・決意を表す。フォーマルな文体。",ex:[{j:"やると いった うえは、さいごまで やりとおします。",t:"既然說了要做，就做到最後。"},{j:"しゃいんである いじょうは、きそくを まもらなければ なりません。",t:"既然是員工，就必須遵守規定。"}]},
{p:"〜に反して・〜に反した（予想・期待に逆らう）",e:"〜に反して：「與〜相反、違背〜（預期/原則/命令等）」。名詞（期待・予想・命令・規則等）に接続。〜のに（逆接）は口語的，に反して はフォーマル・書き言葉的。",ex:[{j:"よそうに はんして、しあいは おもしろかったです。",t:"與預期相反，比賽很有趣。"},{j:"やくそくに はんして、かれは こませんでした。",t:"違背了約定，他沒讓（他人）來。"}]},
],
46:[
{p:"〜ずにはいられない（抑えられない衝動）",e:"〜ずにはいられない：「忍不住就〜，不〜不行」，感情や衝動が抑えられない表現。〜ないではいられない も同じ意味。動詞ない形（ず形）＋にはいられない。",ex:[{j:"このはなしを きいて、わらわず にはいられませんでした。",t:"聽了這個故事，忍不住笑了。"},{j:"かのじょの えを みると、かわいそうで なかずには いられません。",t:"看到她的畫，忍不住覺得可憐而哭了。"}]},
{p:"〜に違いない（強い確信の推量）",e:"〜に違いない：「一定是〜，毫無疑問〜」，話者の強い確信を表す。〜はずです より確信度が高い。〜だろう（50〜60%）＜はずです（70〜80%）＜に違いない（90%以上）。",ex:[{j:"こんなに てんさいてきな さくひんを かいた のは、かれに ちがいありません。",t:"寫出這麼天才作品的，一定是他。"},{j:"かのじょは もう かえった にちがいない。",t:"她一定已經回去了。"}]},
{p:"〜わけではない（部分否定）",e:"〜わけではない：「並不是說〜（不是完全如此）」，全面否定ではなく部分的な否定。〜ない というわけではない も同じ意味。英語の「not that〜」に相当。",ex:[{j:"にほんごが きらいな わけでは ありません。ただ むずかしいと おもっています。",t:"並不是說討厭日文。只是覺得難而已。"},{j:"かならず こられる わけでは ありません。",t:"並不是說一定能來。"}]},
],
47:[
{p:"〜にしたがって（変化の比例）",e:"〜にしたがって：「随著〜，〜也〜」，前件の変化に比例して後件も変化する。〜につれて も同じ意味（につれて はやや口語的）。〜とともに も類似（〜と同時に）。",ex:[{j:"じかんが たつ にしたがって、にほんごが じょうずに なりました。",t:"隨著時間過去，日文越來越好了。"},{j:"ねんれいが あがるにつれて、けんこうが たいせつに なります。",t:"隨著年齡增長，健康變得更重要（につれて）。"}]},
{p:"〜に加えて（追加・さらに）",e:"〜に加えて：「除了〜之外，再加上〜（追加）」，複数の要素を重ねる。〜だけでなく〜も に近いが，に加えて は「上乗せ」感が強い。",ex:[{j:"えいごに くわえて、にほんごも はなせます。",t:"除了英文之外，日文也會說（加法的感覺）。"},{j:"あつさに くわえて、しつども たかいです。",t:"除了熱之外，濕度也高。"}]},
{p:"〜はおろか（〜はもちろん，さらに意外なものまで）",e:"〜はおろか〜も：「別說〜了，連〜都〜」，極端な例を挙げて強調。前件は当然できないこと，後件はもっと驚くべきこと。否定文で使うことが多い。",ex:[{j:"かんじはおろか、ひらがなも よめません。",t:"別說漢字了，連平假名都不會讀。"},{j:"じかんはおろか、おかねも ありません。",t:"別說時間了，連錢都沒有。"}]},
],
48:[
{p:"〜ことから（理由・根拠）",e:"〜ことから：「從〜這點來看/由於〜的緣故」，根拠となる事実や特徴から結論・命名等を導く。〜ので/〜から（理由）と似ているが，ことから は根拠からの導き出し感が強い。",ex:[{j:"この はなが しろい ことから、「しらゆき」と よばれています。",t:"由於這朵花是白色的，被稱為「白雪」。"},{j:"しょうひが ふえていること から、けいざいが かいふくしていると かんがえられます。",t:"從消費增加這點來看，可以認為經濟在恢復。"}]},
{p:"〜につけ（〜するたびに・何かあるごとに）",e:"〜につけ：「每當〜就〜」，ある動作・状況のたびに感情が引き起こされる。〜につけ〜につけ（無論〜還是〜，都〜）の形でも使う。",ex:[{j:"くにの かぞくの ことを おもうにつけ、なつかしくなります。",t:"每當想起家鄉的家人，就會感到懷念。"},{j:"うれしいにつけ かなしいにつけ、かれに でんわします。",t:"無論開心還是難過，都會打電話給他。"}]},
{p:"〜たところで（〜しても意味がない・逆接）",e:"〜たところで：「即使〜了，也〜（沒用/沒意義）」，努力しても効果がない・意味がないことを表す逆接。〜ても に似ているが，たところで は「結果は変わらない」という虚無感が強い。",ex:[{j:"いまさら あやまった ところで、もう おそいです。",t:"就算現在道歉了也已經太晚了。"},{j:"はやく いった ところで、どうせ まつだけです。",t:"就算早點去，反正只是等而已。"}]},
],
49:[

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('mnn_progress') || '{}'); } catch(e) { return {}; }
}
function saveProgress(p) {
  localStorage.setItem('mnn_progress', JSON.stringify(p));
}
let P = loadProgress();

function getLessonProg(id) {
  if (!P[id]) P[id] = { vocabScore: null, grammarScore: null, fullScore: null, weakVocab: [], notedVocab: [] };
  const p = P[id];
  p.done = p.vocabScore !== null && p.grammarScore !== null && p.fullScore !== null;
  return p;
}

function getReviewProg(reviewId) {
  if (!P[reviewId]) P[reviewId] = { vocabScore: null, grammarScore: null, fullScore: null };
  const p = P[reviewId];
  p.done = p.vocabScore !== null && p.grammarScore !== null && p.fullScore !== null;
  return p;
}

}

function renderVocabTab(lesson, p) {
  if (quizState && quizState.lessonId === lesson.id && quizState.type === 'vocab') {
    return quizState.resuming ? renderResumeQuiz() : renderQuizActive();
  }
  // weakVocab: 需加強（剛答錯，尚未處理）
  // notedVocab: 曾錯過（點過學會了，保留提醒）
  const weak = new Set(p.weakVocab || []);
  const noted = new Set(p.notedVocab || []);
  const weakCount = weak.size;
  const notedCount = noted.size;
  const total = lesson.v.length;

  const words = lesson.v.map((w,i) => {
    const isWeak = weak.has(i);
    const isNoted = noted.has(i);
    let cls = 'v-item';
    let tag = '';
    let btn = '';
    if (isWeak) {
      cls += ' weak';
      tag = '<span class="weak-tag">需加強</span>';
      btn = `<button class="v-btn-learned" data-vi="${i}" data-action="learned" data-lid="${lesson.id}">✓ 學會了</button>`;
    } else if (isNoted) {
      cls += ' noted';
      tag = '<span class="noted-tag">曾錯過</span>';
      btn = `<button class="v-btn-mastered" data-vi="${i}" data-action="mastered" data-lid="${lesson.id}">記住了</button>`;
    }
    return `<div class="${cls}">
      <div class="v-main">
        <div class="v-top-row"><span class="v-jp">${w.j}</span>${tag}<button class="v-speak-btn" data-speak="${w.r}" data-audio="audio/vocab/${String(lesson.id).padStart(2,'0')}_${String(i).padStart(2,'0')}.mp3">🔊</button></div>
        <span class="v-reading">${w.r}</span>
        <span class="v-tw">${w.t}</span>
      </div>
      ${btn}
    </div>`;
  }).join('');

  const statBadge = weakCount > 0
    ? `<span class="weak-count-badge">⚠️ 需加強 ${weakCount} 個</span>`
    : notedCount > 0
    ? `<span class="noted-count-badge">📌 曾錯過 ${notedCount} 個</span>`
    : '<span class="all-good-badge">✓ 全部掌握</span>';

  return `
<div class="vocab-section">
  <div class="vocab-stats"><span>共 ${total} 個單字</span>${statBadge}</div>
  <div class="vocab-list">${words}</div>

    <button class="btn-primary" data-start-quiz="vocab" data-lid="${lesson.id}">開始單字測驗 (${total} 題)</button>
    ${p.vocabScore !== null ? `<span class="score-badge">上次：${p.vocabScore}分</span>` : ''}
  </div>
</div>`;
}

// ─── QUIZ ENGINE ─────────────────────────────────────────────
function generateVocabQuestions(lesson) {
  const vocab = lesson.v;
  const indices = vocab.map((_,i) => i).sort(() => Math.random() - 0.5);
  return indices.map(idx => {
    const w = vocab[idx];
    const wrong = vocab.filter((_,i) => i !== idx).sort(() => Math.random() - 0.5).slice(0, 3);
    const opts = [...wrong.map(v => v.t), w.t].sort(() => Math.random() - 0.5);
    return { q: `「${w.j}」（${w.r}）是什麼意思？`, opts, a: opts.indexOf(w.t), type: 'vocab', vocabIdx: idx };
  });
}

function generateGrammarQuestions(lesson) {
  const qs = [];
  const g = getFullGrammar(lesson);

  // 1. 手寫題
  lesson.gq.forEach(q => qs.push({ q: q.q, opts: q.o, a: q.a, type: 'grammar' }));

  // 2. 中文翻譯 → 選正確日文例句
  if (g.length >= 2) {
    // 收集所有例句
    const allEx = g.flatMap((gp, gi) => gp.ex.map(ex => ({ ...ex, gi })));
    allEx.forEach(ex => {
      const wrongs = allEx.filter(e => e.gi !== ex.gi).sort(() => Math.random() - 0.5).slice(0, 3);
      if (wrongs.length < 1) return;
      const opts = [...wrongs.map(e => e.j), ex.j].sort(() => Math.random() - 0.5);
      qs.push({ q: `「${ex.t}」的日文是？`, opts, a: opts.indexOf(ex.j), type: 'grammar' });
    });
  }

  // 4. 句型 → 意思說明
  g.forEach((gp, gi) => {
    const wrongs = g.filter((_,i) => i !== gi).map(x => x.e.split('。')[0].slice(0, 22));
    if (wrongs.length < 1) return;
    const correct = gp.e.split('。')[0].slice(0, 22);
    const opts = [...wrongs.slice(0,3), correct].sort(() => Math.random() - 0.5);
    qs.push({ q: `「${gp.p}」的用法是？`, opts, a: opts.indexOf(correct), type: 'grammar' });
  });

  return qs.sort(() => Math.random() - 0.5);
}

function sampleN(arr, n) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
}

function startQuiz(type, lessonId) {
  const lesson = ALLLESSONS.find(l => l.id === lessonId);
  let questions = [];
  if (type === 'vocab') {
    questions = generateVocabQuestions(lesson);
  } else if (type === 'grammar') {
    questions = generateGrammarQuestions(lesson);
  } else {
    const vq = sampleN(generateVocabQuestions(lesson), 20);
    const gq = sampleN(generateGrammarQuestions(lesson), 10);
    questions = [...vq, ...gq].sort(() => Math.random() - 0.5);
  }
  quizState = { lessonId, type, questions, current: 0, answers: [], finished: false };
  const tab = type === 'vocab' ? 0 : type === 'grammar' ? 1 : 2;
  navigate('lesson', { id: lessonId, tab });
}

function startReviewQuiz(type, reviewId) {
  const rg = REVIEW_GROUPS.find(r => r.id === reviewId);
  const lessons = rg.ids.map(id => ALLLESSONS.find(l => l.id === id));
  let questions = [];
  if (type === 'rvocab') {
    const all = lessons.flatMap(l => generateVocabQuestions(l));
    questions = sampleN(all, 30);
  } else if (type === 'rgrammar') {
    const all = lessons.flatMap(l => generateGrammarQuestions(l));
    questions = sampleN(all, 25);
  } else {
    const vq = sampleN(lessons.flatMap(l => generateVocabQuestions(l)), 20);
    const gq = sampleN(lessons.flatMap(l => generateGrammarQuestions(l)), 15);
    questions = [...vq, ...gq].sort(() => Math.random() - 0.5);
  }
  const tab = type === 'rvocab' ? 0 : type === 'rgrammar' ? 1 : 2;
  quizState = { reviewId, type, questions, current: 0, answers: [], finished: false };
  navigate('review', { reviewId, tab });
}

function renderQuizActive() {
  if (!quizState) return '';
  if (quizState.finished) return renderQuizResult();
  const { questions, current, answers } = quizState;
  const q = questions[current];
  const answered = answers[current] !== undefined;
  const userAns = answers[current];
  const optsHtml = q.opts.map((opt,i) => {
    let cls = 'qz-opt';
    if (answered) {
      if (i === q.a) cls += ' correct';
      else if (i === userAns && i !== q.a) cls += ' wrong';
    }
    return `<button class="${cls}" data-ans="${i}" ${answered ? 'disabled' : ''}>${opt}</button>`;
  }).join('');
  return `
<div class="quiz-active">
  <div class="quiz-header">
    <span class="quiz-progress">${current+1} / ${questions.length}</span>
    <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${Math.round((current+1)/questions.length*100)}%"></div></div>
  </div>
  ${renderQuizCompanion()}
  <div class="quiz-type-badge">${q.type === 'vocab' ? '📖 單字' : '📝 文法'}</div>
  <div class="qz-question">${q.q}</div>
  <div class="qz-opts">${optsHtml}</div>
  ${answered ? `<div class="qz-feedback ${userAns===q.a?'correct-fb':'wrong-fb'}">${userAns===q.a?'✓ 正確！':'✗ 正確答案是：'+q.opts[q.a]}</div>
  <button class="btn-primary qz-next" data-next="1">${current+1 < questions.length ? '下一題 →' : '查看結果 →'}</button>` : ''}

}

</div>`;

function renderEmojiRain() {
  const emoji = {rabbit:'🥕', bwcat:'🐟', ocat:'🦁'}[cwCompanion] || '⭐';
  const drops = Array.from({length:22}, (_,i) => {
    const left = ((i * 4.5) % 98).toFixed(1);
    const dur  = (2.0 + (i % 5) * 0.4 + (i % 3) * 0.3).toFixed(1);
    const delay= ((i % 7) * 0.45).toFixed(1);
    const size = (2.1 + (i % 3) * 0.45).toFixed(2);
    return `<div class="emoji-drop" style="left:${left}%;font-size:${size}rem;animation-duration:${dur}s;animation-delay:-${delay}s">${emoji}</div>`;
  }).join('');
  return `<div class="emoji-rain">${drops}</div>`;
}

function renderCompanionResult(score) {
  const c = COMPANIONS.find(x => x.id === cwCompanion) || COMPANIONS[0];
  const category = score === 100 ? 'perfect' : score >= 70 ? 'done' : 'wrong';
  const lines = (CW_REACT_LINES[category] || {})[cwCompanion] || [];
  const line = lines[Math.floor(Math.random() * lines.length)] || '';
  const anim = score === 100 ? 'anim-spin' : score >= 70 ? 'anim-jump' : 'anim-shake';
  const bg = score === 100 ? '#FFE44D' : score >= 70 ? '#AEFCC0' : '#FFB3B3';
  return `
<div class="result-companion">
  <div class="result-comp-bubble" style="border-color:${bg};background:${bg}">${line}</div>
  <div class="result-comp-char ${anim}">${COMPANION_SVGS[c.id]}</div>
  <div class="result-comp-name" style="color:${c.color}">${c.name}</div>
</div>`;
}

function renderQuizResult() {
  const { questions, answers, type, lessonId, reviewId } = quizState;
  const correct = answers.filter((a,i) => a === questions[i].a).length;
  const total = questions.length;
  const score = Math.round(correct / total * 100);
  const grade = score >= 90 ? '優秀！🎉' : score >= 70 ? '通過！👍' : score >= 50 ? '還需練習💪' : '再努力一下😅';

  const isReview = !!reviewId;
  let allDoneMsg = '';
  let weakCount = 0;
  let retryBtn = '';
  let backBtn = `<button class="btn-primary" data-nav="list" data-clear-quiz="1">返回課程列表</button>`;

  if (isReview) {
    const rp = getReviewProg(reviewId);
    if (type === 'rvocab') rp.vocabScore = score;
    else if (type === 'rgrammar') rp.grammarScore = score;
    else rp.fullScore = score;
    saveProgress(P);
    const missing = [];
    if (rp.vocabScore === null) missing.push('單字複習');
    if (rp.grammarScore === null) missing.push('文法複習');
    if (rp.fullScore === null) missing.push('五課總複習');
    allDoneMsg = rp.done
      ? '<div class="pass-msg">🎊 三項複習測驗全部完成！</div>'
      : missing.length ? `<div class="todo-msg">還差 ${missing.join('、')} 才算完成複習</div>` : '';
    retryBtn = `<button class="btn-secondary" data-start-review="${type}" data-review-id="${reviewId}">再做一次</button>`;
  } else {
    const p = getLessonProg(lessonId);
    if (type === 'vocab') { p.vocabScore = score; }
    else if (type === 'grammar') { p.grammarScore = score; }
    else { p.fullScore = score; }
    if (type === 'vocab') {
      const weak = questions.map((q,i) => answers[i] !== q.a ? q.vocabIdx : null).filter(idx => idx !== null);
      p.weakVocab = weak;
      weakCount = weak.length;
    }
    saveProgress(P);
    const missing = [];
    if (p.vocabScore === null) missing.push('單字測驗');
    if (p.grammarScore === null) missing.push('文法測驗');
    if (p.fullScore === null) missing.push('整課測驗');
    allDoneMsg = p.done
      ? '<div class="pass-msg">🎊 三項測驗全部完成，本課標記為完成！</div>'
      : missing.length ? `<div class="todo-msg">還差 ${missing.join('、')} 才算完成本課</div>` : '';
    retryBtn = `<button class="btn-secondary" data-start-quiz="${type}" data-lid="${lessonId}">再做一次</button>`;
    if (type === 'vocab') backBtn = `<button class="btn-outline" data-nav="lesson" data-id="${lessonId}" data-go-tab="0" data-clear-quiz="1">查看需加強單字</button>${backBtn}`;
  }

  const details = questions.map((q,i) => {
    const ok = answers[i] === q.a;
    return `<div class="result-item ${ok?'ok':'ng'}"><span class="ri-icon">${ok?'✓':'✗'}</span><span class="ri-q">${q.q}</span>${!ok?`<span class="ri-ans">→ 正確：${q.opts[q.a]}</span>`:''}</div>`;
  }).join('');

  return `
${renderEmojiRain()}
<div class="quiz-result">
  ${renderCompanionResult(score)}
  <div class="result-score">${score}<span class="result-unit">分</span></div>
  <div class="result-grade">${grade}</div>
  <div class="result-detail">${correct} / ${total} 題正確</div>
  ${weakCount > 0 ? `<div class="weak-notice">⚠️ 有 ${weakCount} 個單字已標記「需加強」，回到單字列表可查看</div>` : ''}
  ${allDoneMsg}
  <div class="result-list">${details}</div>
  <div class="result-btns">
    ${retryBtn}
    ${backBtn}
  </div>
</div>`;
}

// ─── EVENT BINDING ───────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      const view = el.dataset.nav;
      const id = el.dataset.id ? parseInt(el.dataset.id) : null;
      const reviewId = el.dataset.reviewId || null;
      const goTab = el.dataset.goTab !== undefined ? parseInt(el.dataset.goTab) : 0;
      if (el.dataset.clearQuiz) quizState = null;
      if (quizState && !quizState.finished) quizState.resuming = true;
      if (kanaQuizState && kanaQuizState.current < (kanaQuizState.questions||[]).length) kanaQuizState.resuming = true;
      if (view === 'review' && reviewId) navigate('review', { reviewId, tab: 0 });
      else if (id) navigate(view, { id, tab: goTab });
      else navigate(view);
    });
  });
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      const tab = parseInt(el.dataset.tab);
      if (quizState && !quizState.finished) quizState.resuming = true;
      if (currentView === 'review') navigate('review', { reviewId: currentReviewId, tab });
      else navigate('lesson', { id: currentLessonId, tab });
    });
  });
  document.querySelectorAll('[data-vi]').forEach(el => {
    el.addEventListener('click', () => {
      const vi = parseInt(el.dataset.vi);
      const lid = parseInt(el.dataset.lid);
      const action = el.dataset.action;
      const p = getLessonProg(lid);
      const weak = new Set(p.weakVocab || []);
      const noted = new Set(p.notedVocab || []);
      if (action === 'learned') { weak.delete(vi); noted.add(vi); }
      else if (action === 'mastered') { noted.delete(vi); }
      p.weakVocab = [...weak];
      p.notedVocab = [...noted];
      saveProgress(P);
      navigate('lesson', { id: lid, tab: 0 });
    });
  });
  document.querySelectorAll('[data-start-quiz]').forEach(el => {
    el.addEventListener('click', () => {
      startQuiz(el.dataset.startQuiz, parseInt(el.dataset.lid));
    });
  });
  document.querySelectorAll('[data-start-review]').forEach(el => {
    el.addEventListener('click', () => {
      startReviewQuiz(el.dataset.startReview, el.dataset.reviewId);
    });
  });
  document.querySelectorAll('[data-ans]').forEach(el => {
    el.addEventListener('click', () => {
      if (!quizState || quizState.finished) return;
      const { current, answers } = quizState;
      if (answers[current] !== undefined) return;
      const ans = parseInt(el.dataset.ans);
      quizState.answers[current] = ans;
      const q = quizState.questions[current];
      cwReact(ans === q.a ? 'correct' : 'wrong');
      if (currentView === 'review') navigate('review', { reviewId: currentReviewId, tab: currentTab });
      else navigate('lesson', { id: quizState.lessonId, tab: currentTab });
    });
  });
  document.querySelectorAll('[data-next]').forEach(el => {
    el.addEventListener('click', () => {
      if (!quizState) return;
      speakCompanion(cwCompanion);
      if (quizState.current + 1 >= quizState.questions.length) {
        quizState.finished = true;
        const corr = quizState.answers.filter((a,i)=>a===quizState.questions[i].a).length;
        const sc = Math.round(corr/quizState.questions.length*100);
        setTimeout(()=>cwReact(sc===100?'perfect':sc>=70?'done':'wrong'), 400);
      }
      else quizState.current++;
      if (currentView === 'review') navigate('review', { reviewId: currentReviewId, tab: currentTab });
      else navigate('lesson', { id: quizState.lessonId, tab: currentTab });
    });
  });
  // ── 發音 ──
  document.querySelectorAll('[data-speak]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); playAudio(el.dataset.audio || null, el.dataset.speak); });
  });
  // ── 首頁換角色 ──
  document.querySelectorAll('[data-pick]').forEach(el => {
    el.addEventListener('click', () => { speakCompanion(el.dataset.pick); pickCompanion(el.dataset.pick); });
  });
  // ── 繼續/重新測驗 ──
  document.querySelectorAll('[data-resume-quiz]').forEach(el => {
    el.addEventListener('click', () => {
      if (!quizState) return;
      const action = el.dataset.resumeQuiz;
      if (action === 'continue') {
        quizState.resuming = false;
        if (quizState.reviewId) navigate('review', { reviewId: quizState.reviewId, tab: currentTab });
        else navigate('lesson', { id: quizState.lessonId, tab: currentTab });
      } else if (action === 'restart') {
        if (quizState.reviewId) startReviewQuiz(quizState.type, quizState.reviewId);
        else startQuiz(quizState.type, quizState.lessonId);
      }
    });
  });
  document.querySelectorAll('[data-kana-resume]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.kanaResume;
      if (action === 'continue') { kanaQuizState.resuming = false; navigate('gojuuon'); }
      else if (action === 'restart') startKanaQuiz();
    });
  });
  // ── 五十音 events ──
  document.querySelectorAll('[data-kana-type]').forEach(el => {
    el.addEventListener('click', () => { kanaType=el.dataset.kanaType; kanaQuizState=null; navigate('gojuuon'); });
  });
  document.querySelectorAll('[data-kana-sec]').forEach(el => {
    el.addEventListener('click', () => { kanaSection=el.dataset.kanaSec; kanaQuizState=null; navigate('gojuuon'); });
  });
  document.querySelectorAll('[data-kana-mode]').forEach(el => {
    el.addEventListener('click', () => { kanaMode=el.dataset.kanaMode; navigate('gojuuon'); });
  });
  document.querySelectorAll('[data-kana-action]').forEach(el => {
    el.addEventListener('click', () => {
      const a = el.dataset.kanaAction;
      if (a==='start') startKanaQuiz();
      else if (a==='next') { speakCompanion(cwCompanion); kanaReadDelay = 950; advanceKanaQuiz(); }
      else if (a==='retry') startKanaQuiz();
      else if (a==='back') { kanaQuizState=null; navigate('gojuuon'); }
    });
  });
  document.querySelectorAll('[data-kana-ans]').forEach(el => {
    el.addEventListener('click', () => {
      if (!kanaQuizState || kanaQuizState.answered) return;
      const { questions, current } = kanaQuizState;
      const q = questions[current];
      const chosen = el.dataset.kanaAns;
      const isK2R = kanaMode === 'k2r';
      const answer = isK2R ? q.r : q.k;
      kanaQuizState.answered = true;
      kanaQuizState.choice = chosen;
      if (chosen === answer) { kanaQuizState.score++; cwReact('correct'); }
      else cwReact('wrong');
      navigate('gojuuon');
    });
  });
}

function getKanaPool(type, section) {
  const src = section==='basic' ? KANA_TABLE[type] : section==='daku' ? KANA_DAKU[type] : KANA_YOU[type];
  return src.flatMap(r => r.cells).filter(c => c.k && c.r);
}

function startKanaQuiz() {
  const pool = getKanaPool(kanaType, kanaSection);
  const shuffled = [...pool].sort(() => Math.random()-0.5);
  const qs = shuffled.slice(0, Math.min(20, shuffled.length));
  kanaQuizState = { questions:qs, current:0, score:0, answered:false, choice:null, choices:null };
  navigate('gojuuon');
}

function advanceKanaQuiz() {
  if (!kanaQuizState) return;
  kanaQuizState.current++;
  kanaQuizState.answered = false;
  kanaQuizState.choice = null;
  kanaQuizState.choices = null; // 清掉，讓下一題重新生成
  if (kanaQuizState.current >= kanaQuizState.questions.length) {
    const pct = Math.round(kanaQuizState.score / kanaQuizState.questions.length * 100);
    setTimeout(() => cwReact(pct===100?'perfect':pct>=70?'done':'wrong'), 300);
    // 儲存最佳成績
    const key = `mnn_kana_${kanaType}_${kanaSection}`;
    const prev = parseInt(localStorage.getItem(key) || '0');
    if (pct > prev) localStorage.setItem(key, pct);
  }
  navigate('gojuuon');
}

function renderKanaChart(type, section) {
  const isYou = section === 'you';
  const src = isYou ? KANA_YOU[type] : section==='daku' ? KANA_DAKU[type] : KANA_TABLE[type];
  const gridStyle = isYou
    ? 'grid-template-columns:64px repeat(3,1fr)'
    : 'grid-template-columns:64px repeat(5,1fr)';
  const colHeads = isYou
    ? ['ゃ・ya','ゅ・yu','ょ・yo'].map(h => `<div class="kana-col-head">${h}</div>`).join('')
    : ['a','i','u','e','o'].map(h => `<div class="kana-col-head">${h}</div>`).join('');
  const rows = src.map(row => {
    const cells = row.cells.map(c => c.k
      ? `<div class="kana-cell" data-speak="${c.k}" data-audio="audio/kana/${c.r}.mp3"><span class="kana-c">${c.k}</span><span class="kana-r">${c.r}</span></div>`
      : `<div class="kana-cell empty"></div>`).join('');
    return `<div class="kana-row-lbl">${row.row}</div>${cells}`;
  }).join('');
  return `<div class="kana-grid" style="${gridStyle}"><div class="kana-col-head"></div>${colHeads}${rows}</div>`;
}

function renderKanaQuizUI() {
  const { questions, current, score, answered, choice } = kanaQuizState;
  if (current >= questions.length) {
    const pct = Math.round(score/questions.length*100);
    return `
${renderEmojiRain()}
<div class="kq-result">
  ${renderCompanionResult(pct)}
  <div class="kq-big">${score}<span class="kq-total">/${questions.length}</span></div>
  <div class="kq-pct">${pct}%</div>
  <div class="kq-btns">
    <button class="btn-primary" data-kana-action="retry">再挑戰 🔁</button>
    <button class="btn-outline" data-kana-action="back">返回五十音表</button>
  </div>
</div>`;
  }
  const q = questions[current];
  const pool = getKanaPool(kanaType, kanaSection);
  const isK2R = kanaMode === 'k2r';
  const answer = isK2R ? q.r : q.k;
  const questionText = isK2R ? q.k : q.r;
  // 固定選項：答題後不重新洗牌，避免高亮跑掉
  let choices;
  if (kanaQuizState.choices) {
    choices = kanaQuizState.choices;
  } else {
    const poolFiltered = pool.filter(x => (isK2R ? x.r : x.k) !== answer);
    const distractors = poolFiltered.sort(() => Math.random()-0.5).slice(0,3).map(x => isK2R ? x.r : x.k);
    choices = [...distractors, answer].sort(() => Math.random()-0.5);
    kanaQuizState.choices = choices;
  }
  const pct = current / questions.length * 100;
  const choiceButtons = choices.map(c => {
    let cls = 'kq-choice';
    if (answered) {
      if (c===answer) cls += ' kq-correct';
      else if (c===choice) cls += ' kq-wrong';
    }
    return `<button class="${cls}" data-kana-ans="${c}" ${answered?'disabled':''}>${c}</button>`;
  }).join('');
  if (!kanaQuizState.answered) { setTimeout(() => playAudio(`audio/kana/${q.r}.mp3`, q.k), kanaReadDelay); kanaReadDelay = 300; }
  return `
<div class="kana-quiz-ui">
  <div class="kq-progress">
    <div class="kq-bar"><div class="kq-fill" style="width:${pct}%"></div></div>
    <span class="kq-count">${current+1} / ${questions.length}</span>
  </div>
  ${renderQuizCompanion()}
  <div class="kq-q" data-speak="${q.k}">${questionText}</div>
  <div class="kq-choices">${choiceButtons}</div>
  ${answered ? '<button class="btn-primary kq-next" data-kana-action="next">次へ →</button>' : ''}
</div>`;
}

function renderGojuuon() {
  const typeTabs = ['hiragana','katakana'].map(t =>
    `<button class="kana-ttab ${kanaType===t?'act':''}" data-kana-type="${t}">${t==='hiragana'?'平假名 (ひらがな)':'片假名 (カタカナ)'}</button>`

  return `

  <h2 class="gojuuon-title">五十音表</h2>

  <div class="kana-stabs">${secTabs}</div>

    ? `<div class="kana-quiz-bar-label">${typeLabel}・${sectionLabel} 練習中
        <button class="kana-show-chart-btn" data-kana-action="back">查看表格</button>
       </div>`
    : renderKanaChart(kanaType, kanaSection)}
  ${quizArea}
</div>`;
}

function _loadJpVoice() {
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  const jp = voices.filter(v => v.lang.startsWith('ja'));
  // 優先順序：Kyoko(Apple女聲) > Google日本語 > Haruka(Windows女聲) > 其他日文聲音
  _jpVoice = jp.find(v => /kyoko/i.test(v.name))
    || jp.find(v => /google/i.test(v.name) && !/male/i.test(v.name))
    || jp.find(v => /haruka/i.test(v.name))
    || jp.find(v => !/male/i.test(v.name))
    || jp[0] || null;
}
if (window.speechSynthesis) {
  _loadJpVoice();
  window.speechSynthesis.onvoiceschanged = _loadJpVoice;
}

}

function fixParticles(text) {
  // は後面是空白、標點、句尾 → 助詞，改成わ（避免念 ha）
  // へ同理 → え　　を同理 → お
  // 只對句子（長度>2）處理，單一假名不動（五十音練習用）
  if (text.length <= 2) return text;
  return text
    .replace(/は(?=[\s　。、！？」\n]|$)/g, 'わ')
    .replace(/へ(?=[\s　。、！？」\n]|$)/g, 'え')
    .replace(/を/g, 'お');
}

function speakCompanion(id) {
  if (!soundEnabled) return;
  if (!['rabbit','bwcat','ocat'].includes(id)) return;
  playAudio(`audio/${id}.mp3`, {rabbit:'にんじん！',bwcat:'ミミ！',ocat:'めめ！'}[id]);
}

function hiraganaToKatakana(str) {
  // U+3041-U+3096 是平假名範圍，+0x60 轉成片假名（發音完全相同）
  // 片假名在 TTS 訓練資料中拗音出現頻率更高，引擎識別更穩定
  return str.replace(/[ぁ-ゖ]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) + 0x60));
}

function speak(text, rate) {
  if (!soundEnabled || !window.speechSynthesis) return;
  if (!_jpVoice) _loadJpVoice();
  window.speechSynthesis.cancel();
  // 1. 助詞は→わ（用空白判斷）2. 去空白 3. 平假名→片假名（拗音更穩定）
  const processed = hiraganaToKatakana(fixParticles(text).replace(/[\s　]+/g, ''));
  const u = new SpeechSynthesisUtterance(processed);
  u.lang = 'ja-JP';
  u.rate = rate || 0.85;
  u.pitch = 1.15;
  if (_jpVoice) u.voice = _jpVoice;
  window.speechSynthesis.speak(u);
}

function playAudio(src, fallbackText) {
  if (!soundEnabled) return;
  if (src) {
    const audio = new Audio(src);
    audio.onerror = () => speak(fallbackText, 0.8);
    audio.play().catch(() => speak(fallbackText, 0.8));
    return;
  }
  speak(fallbackText, 0.8);
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'correct') {
      // 三個音階遞升，像清脆鐘聲，每個音都有自然衰減
      [[523.25, 0], [659.25, 0.18], [783.99, 0.34]].forEach(([freq, delay]) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.28, t + 0.015);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
        osc.start(t); osc.stop(t + 1.0);
      });
    } else if (type === 'wrong') {
      // 溫和的下降音，不刺耳
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(370, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(220, ctx.currentTime + 0.5);
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
      osc.start(); osc.stop(ctx.currentTime + 0.8);
    }
  } catch(e) {}
}

  const cw = document.getElementById('cw');
  cw.innerHTML = `
    <div id="cw-inner" class="cw-inner">
      <div id="cw-bubble" class="cw-bubble"></div>
      <div id="cw-char" class="cw-char anim-bob">${COMPANION_SVGS[c.id]}</div>
      <div class="cw-name" style="color:${c.color}">${c.name}</div>
      <button class="cw-sound-btn" id="cw-sound-btn">${soundEnabled ? '🔊' : '🔇'}</button>
    </div>`;
  cw.querySelector('#cw-inner').addEventListener('click', (e) => {
    if (e.target.id === 'cw-sound-btn') { toggleSound(); return; }
    speakCompanion(cwCompanion);
    showCwSpeech(getCwLine());
  });
  startCwCycle();
}

function getCwLine() {
  const lines = {
    rabbit: ['ぴょん！','にんじんは？','いっしょにがんばろ！','はやく！はやく！','えらい！'],
    bwcat:  ['にゃ。','できるにゃ…','集中！','なかなかやるな。','もう一問！'],
    ocat:   ['一つ目でも全部見てるよ！','かっこよく答えろ！','諦めたら終わりだ！','よし！','いくぞ！'],
  };
  const pool = (lines[cwCompanion] || []).concat(COMPANION_LINES);
  return pool[Math.floor(Math.random() * pool.length)];
}

function switchCompanion() {
  clearTimeout(cwTimer);
  cwCompanion = null;
  localStorage.removeItem('mnn_companion');
  document.getElementById('cw').innerHTML = '';
  const app = document.getElementById('app');
  app.innerHTML = renderSelectScreen();
  bindSelectEvents();
}

function startCwCycle() {
  clearTimeout(cwTimer);
  function cycle() {
    const char = document.getElementById('cw-char');
    if (!char) return;
    cwAnimIdx = (cwAnimIdx + 1) % CW_ANIMS.length;
    char.className = 'cw-char anim-' + CW_ANIMS[cwAnimIdx];
    if (Math.random() < 0.25) showCwSpeech();
    cwTimer = setTimeout(cycle, 2800 + Math.random() * 3500);
  }
  cwTimer = setTimeout(cycle, 3000);
}

function showCwSpeech(text) {
  const b = document.getElementById('cw-bubble');
  if (!b) return;
  b.textContent = text || COMPANION_LINES[Math.floor(Math.random() * COMPANION_LINES.length)];
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), 2600);
}

const CW_REACT_LINES = {
  correct: {
    rabbit: ['ぴょん！正解！','やった！にんじんあげる！','すごい！すごい！'],
    bwcat:  ['にゃ。正解。','まあ…よくできたにゃ。','…認める。'],
    ocat:   ['よし！正解だ！','さすが！','その調子！'],
  },
  wrong: {
    rabbit: ['あ〜！もう一回！','ぴょん…次！','大丈夫！ぴょんぴょん！'],
    bwcat:  ['にゃ……','次は絶対にゃ。','惜しい。集中。'],
    ocat:   ['まだだ！立て！','一吉も間違えた事ある。','次！諦めるな！'],
  },
  perfect: {
    rabbit: ['完璧！！ぴょんぴょん！！','最高！！にんじん山盛り！！'],
    bwcat:  ['…完璧にゃ。（尻尾フリフリ）','これが本物の実力にゃ。'],
    ocat:   ['完璧だ！かっこいい！！','一吉も鼻が高い！！'],
  },
  done: {
    rabbit: ['完成！えらい！ぴょん！','やりきった！にんじん！'],
    bwcat:  ['お疲れにゃ。よくやった。','…偉い。（ごろごろ）'],
    ocat:   ['やりきった！最高だ！','一吉と一緒に頑張った！'],
  },
};

function cwReact(type) {
  const pool = (CW_REACT_LINES[type] || {})[cwCompanion] || ['やった！','次！','頑張れ！'];
  const msg = pool[Math.floor(Math.random() * pool.length)];
  const animMap = { correct:'anim-spin', wrong:'anim-shake', perfect:'anim-spin', done:'anim-jump' };

  if (type === 'correct' || type === 'perfect' || type === 'done') playSound('correct');
  else if (type === 'wrong') playSound('wrong');

  if (document.getElementById('quiz-char')) {
    // 測驗內嵌模式：存狀態，渲染時套用
    quizCharAnim = animMap[type] || 'anim-bob';
    quizBubbleText = msg;
    clearTimeout(_quizAnimTimer);
    clearTimeout(_quizBubbleTimer);
    _quizAnimTimer = setTimeout(() => { quizCharAnim = 'anim-bob'; }, 1600);
    _quizBubbleTimer = setTimeout(() => {
      quizBubbleText = '';
      const b = document.getElementById('quiz-bubble');
      if (b) b.classList.remove('show');
    }, 2600);
  } else {
    // 固定 widget 模式
    const char = document.getElementById('cw-char');
    if (!char) return;
    if (type === 'correct') {
      char.className = 'cw-char anim-spin';
      setTimeout(() => { if(char) char.className='cw-char anim-bob'; }, 1500);
    } else if (type === 'wrong') {
      char.className = 'cw-char anim-shake';
      setTimeout(() => { if(char) char.className='cw-char anim-sit'; }, 1500);
    } else if (type === 'perfect') {
      char.className = 'cw-char anim-spin';
    } else if (type === 'done') {
      char.className = 'cw-char anim-jump';
    }
    showCwSpeech(msg);
  }
}

// ─── INIT ────────────────────────────────────────────────────
initCompanionWidget();

function render() {
  const app = document.getElementById('app');
  if (currentView === 'home') app.innerHTML = renderHome();
  else if (currentView === 'list') app.innerHTML = renderList();
  else if (currentView === 'lesson') app.innerHTML = renderLesson(currentLessonId);
  else if (currentView === 'review') app.innerHTML = renderReview(currentReviewId);
  else if (currentView === 'gojuuon') app.innerHTML = renderGojuuon();
  bindEvents();
  const cw = document.getElementById('cw');
  if (cw) cw.style.display = document.getElementById('quiz-char') ? 'none' : '';
}

function bindSelectEvents() {
  document.querySelectorAll('[data-pick]').forEach(el => {
    el.addEventListener('click', () => pickCompanion(el.dataset.pick));
  });
}

render();


</script>
</body>
</html>
